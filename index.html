<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Merlin AI - Generador de Imágenes</title>
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow-x: hidden; }
        
        body {
            background: #0a0a0a;
            color: #e8e8e8;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideIn { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
 
        .studio-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0;
            height: 100vh;
            width: 100%;
        }
 
        /* MOBILE FIRST */
        .sidebar-left {
            background: linear-gradient(180deg, #1a1a2e 0%, #0f0f23 100%);
            border-right: 1px solid rgba(139, 92, 246, 0.2);
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            animation: slideIn 0.5s ease;
            height: auto;
            max-height: 45vh;
            border-bottom: 1px solid rgba(139, 92, 246, 0.2);
        }
 
        .logo-section {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(139, 92, 246, 0.2);
        }
 
        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #06b6d4 0%, #8b5cf6 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.3);
            flex-shrink: 0;
        }
 
        .logo-text h1 { font-size: 16px; font-weight: 700; color: #06b6d4; }
        .logo-text p { font-size: 9px; color: #666; }
 
        .sound-toggle {
            position: fixed;
            top: 12px;
            right: 12px;
            background: rgba(139, 92, 246, 0.2);
            border: 1px solid rgba(139, 92, 246, 0.3);
            color: #06b6d4;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            z-index: 50;
        }
 
        .sound-toggle:active { border-color: #06b6d4; }
 
        .prompt-box { display: flex; flex-direction: column; gap: 8px; }
        .prompt-label { font-size: 10px; font-weight: 700; color: #06b6d4; }
        .prompt-textarea {
            background: rgba(255, 255, 255, 0.04);
            border: 1.5px solid rgba(139, 92, 246, 0.25);
            border-radius: 8px;
            padding: 10px;
            color: #e8e8e8;
            font-size: 12px;
            min-height: 70px;
            resize: vertical;
            font-family: inherit;
            transition: all 0.3s;
            width: 100%;
        }
 
        .prompt-textarea:focus {
            outline: none;
            border-color: #06b6d4;
            background: rgba(255, 255, 255, 0.08);
        }
 
        .quick-actions {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }
 
        .quick-btn {
            flex: 1;
            padding: 8px;
            background: rgba(139, 92, 246, 0.1);
            border: 1px solid rgba(139, 92, 246, 0.25);
            color: #06b6d4;
            border-radius: 6px;
            font-size: 10px;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
 
        .quick-btn:active {
            background: rgba(139, 92, 246, 0.2);
            border-color: #06b6d4;
        }
 
        .tabs-container { display: flex; gap: 6px; border-bottom: 1px solid rgba(139, 92, 246, 0.2); padding-bottom: 8px; }
        .tab-btn {
            padding: 6px 10px; background: none; border: none; color: #666; cursor: pointer;
            font-size: 10px; font-weight: 700; border-bottom: 2px solid transparent; transition: all 0.3s;
        }
        .tab-btn.active { color: #06b6d4; border-bottom-color: #06b6d4; }
 
        .controls-panel { display: none; flex-direction: column; gap: 12px; }
        .controls-panel.active { display: flex; animation: fadeIn 0.3s; }
        .control-group { display: flex; flex-direction: column; gap: 8px; }
        .control-label { font-size: 9px; font-weight: 700; color: #999; }
 
        .button-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .option-btn {
            padding: 8px 10px; background: rgba(139, 92, 246, 0.08); border: 1px solid rgba(139, 92, 246, 0.25);
            border-radius: 6px; color: #999; font-size: 10px; font-weight: 600; cursor: pointer; transition: all 0.3s;
        }
        .option-btn:active { border-color: #06b6d4; color: #06b6d4; }
        .option-btn.active { background: linear-gradient(135deg, #06b6d4, #8b5cf6); color: white; border-color: transparent; }
 
        .slider { width: 100%; height: 4px; border-radius: 2px; background: rgba(139, 92, 246, 0.15); outline: none; cursor: pointer; }
        .slider::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #06b6d4; }
 
        .generate-btn {
            width: 100%; padding: 12px; background: linear-gradient(135deg, #06b6d4, #8b5cf6); border: none;
            border-radius: 8px; color: white; font-weight: 700; font-size: 12px; cursor: pointer; transition: all 0.3s;
            margin-top: 6px;
        }
 
        .generate-btn:active:not(.loading) { transform: scale(0.98); }
        .generate-btn.loading { opacity: 0.7; cursor: not-allowed; }
 
        .status-message { padding: 10px; border-radius: 6px; font-size: 11px; margin-top: 6px; display: none; }
        .status-message.show { display: block; animation: fadeIn 0.3s; }
        .status-message.success { background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.3); color: #10b981; }
        .status-message.error { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); color: #ef4444; }
        .status-message.info { background: rgba(6, 182, 212, 0.1); border: 1px solid rgba(6, 182, 212, 0.3); color: #06b6d4; }
 
        /* CANVAS CENTER */
        .canvas-center { 
            display: flex; 
            flex-direction: column; 
            background: #0a0a0a; 
            overflow: hidden; 
            flex: 1;
            min-height: 0;
        }
 
        .toolbar { 
            background: rgba(26, 26, 46, 0.8); 
            border-bottom: 1px solid rgba(139, 92, 246, 0.2); 
            padding: 12px; 
            display: flex; 
            justify-content: space-between; 
            gap: 8px; 
            flex-wrap: wrap; 
        }
 
        .toolbar-left { display: flex; gap: 6px; flex-wrap: wrap; }
        .toolbar-btn { 
            padding: 6px 10px; 
            background: rgba(139, 92, 246, 0.08); 
            border: 1px solid rgba(139, 92, 246, 0.25); 
            border-radius: 6px; 
            color: #999; 
            font-size: 10px; 
            cursor: pointer; 
            transition: all 0.3s; 
            white-space: nowrap; 
        }
        .toolbar-btn:active { border-color: #06b6d4; color: #06b6d4; }
 
        .canvas-area { 
            flex: 1; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: flex-start; 
            padding: 12px; 
            overflow-y: auto; 
            background: linear-gradient(135deg, rgba(15, 15, 35, 0.5), rgba(10, 10, 26, 0.5)); 
            gap: 12px;
            min-height: 0;
        }
 
        .canvas-display { 
            width: 100%; 
            height: 250px;
            background: rgba(139, 92, 246, 0.05); 
            border: 2px dashed rgba(6, 182, 212, 0.3); 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden; 
            position: relative; 
            flex-shrink: 0;
        }
 
        .canvas-display img { width: 100%; height: 100%; object-fit: cover; }
 
        .canvas-placeholder { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 8px; 
            color: #555; 
            text-align: center; 
            padding: 12px; 
        }
 
        .canvas-placeholder div:first-child { font-size: 32px; }
        .canvas-placeholder div:last-child { font-size: 12px; }
 
        .spinner { 
            width: 36px; 
            height: 36px; 
            border: 3px solid rgba(6, 182, 212, 0.2); 
            border-top-color: #06b6d4; 
            border-radius: 50%; 
            animation: spin 1s linear infinite; 
        }
 
        .canvas-actions {
            display: flex;
            gap: 8px;
            width: 100%;
            flex-wrap: wrap;
            justify-content: center;
            flex-shrink: 0;
        }
 
        .canvas-actions button {
            flex: 1;
            min-width: 90px;
            padding: 14px;
            background: linear-gradient(135deg, #06b6d4, #8b5cf6);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
        }
 
        .canvas-actions button:active {
            transform: scale(0.98);
        }
 
        /* SIDEBAR RIGHT */
        .sidebar-right { 
            background: linear-gradient(180deg, #1a1a2e, #0f0f23); 
            border-top: 1px solid rgba(139, 92, 246, 0.2); 
            overflow-y: auto; 
            padding: 16px; 
            display: flex; 
            flex-direction: column; 
            gap: 16px; 
            height: auto; 
            max-height: 35vh; 
        }
 
        .sidebar-header { 
            font-size: 10px; 
            font-weight: 700; 
            color: #06b6d4; 
            padding-bottom: 10px; 
            border-bottom: 1px solid rgba(139, 92, 246, 0.2); 
        }
 
        .color-palette {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            margin-top: 8px;
        }
 
        .color-swatch {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }
 
        .color-swatch:active {
            border-color: #06b6d4;
        }
 
        .filter-group { 
            display: flex; 
            flex-direction: column; 
            gap: 6px; 
            margin-bottom: 12px; 
        }
 
        .filter-label { 
            font-size: 9px; 
            color: #06b6d4; 
            font-weight: 700; 
        }
 
        .filter-select { 
            background: rgba(255, 255, 255, 0.04); 
            border: 1px solid rgba(139, 92, 246, 0.25); 
            border-radius: 4px; 
            padding: 6px; 
            color: #e8e8e8; 
            font-size: 10px; 
        }
 
        .prompts-marketplace { 
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
            max-height: 250px; 
            overflow-y: auto; 
        }
 
        .prompt-card { 
            background: rgba(139, 92, 246, 0.08); 
            border: 1px solid rgba(139, 92, 246, 0.2); 
            border-radius: 6px; 
            padding: 8px; 
            font-size: 9px; 
            transition: all 0.3s; 
        }
 
        .prompt-card:active { 
            border-color: #06b6d4; 
            background: rgba(6, 182, 212, 0.1); 
        }
 
        .prompt-card-title { color: #06b6d4; font-weight: 700; margin-bottom: 3px; }
        .prompt-card-price { color: #10b981; font-weight: 700; }
        .prompt-card-category { color: #999; font-size: 8px; }
 
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.3); }
        ::-webkit-scrollbar-thumb { background: rgba(6, 182, 212, 0.3); border-radius: 3px; }
 
        /* TABLET Y DESKTOP */
        @media (min-width: 768px) {
            .studio-container {
                grid-template-columns: 280px 1fr 320px;
                gap: 0;
            }
 
            .sidebar-left {
                max-height: 100vh;
                height: 100vh;
                border-bottom: none;
                padding: 20px;
                gap: 20px;
            }
 
            .sidebar-right {
                max-height: 100vh;
                height: 100vh;
                border-top: none;
                border-left: 1px solid rgba(139, 92, 246, 0.2);
                padding: 20px;
                gap: 18px;
            }
 
            .canvas-center {
                border-left: 1px solid rgba(139, 92, 246, 0.2);
                border-right: 1px solid rgba(139, 92, 246, 0.2);
            }
 
            .canvas-area {
                justify-content: center;
                padding: 20px;
            }
 
            .canvas-display {
                height: auto;
                aspect-ratio: 4/3;
                max-width: 700px;
            }
 
            .canvas-actions {
                justify-content: center;
            }
 
            .toolbar {
                padding: 16px 20px;
                gap: 12px;
            }
 
            .logo-icon {
                width: 44px;
                height: 44px;
                font-size: 22px;
            }
 
            .logo-text h1 { font-size: 18px; }
            .logo-text p { font-size: 10px; }
 
            .prompt-textarea { min-height: 100px; font-size: 13px; }
            .prompt-label { font-size: 11px; }
            .quick-btn { font-size: 11px; }
            .generate-btn { font-size: 13px; padding: 14px; }
        }
 
        @media (max-width: 767px) {
            .sidebar-right { display: none; }
        }
    </style>
</head>
<body>
    <button class="sound-toggle" id="soundToggle" onclick="toggleSound()">🔊</button>
 
    <div class="studio-container">
        
        <!-- SIDEBAR LEFT -->
        <div class="sidebar-left">
            <div class="logo-section">
                <div class="logo-icon">✨</div>
                <div class="logo-text">
                    <h1>MERLIN AI</h1>
                    <p>Generador IA</p>
                </div>
            </div>
 
            <div class="quick-actions">
                <button class="quick-btn" onclick="panicCreative()" title="3 ideas">🎲 Pánico</button>
                <button class="quick-btn" onclick="toggleInpaint()" title="Editar">✏️ Inpaint</button>
            </div>
 
            <div class="prompt-box">
                <label class="prompt-label">Tu idea</label>
                <textarea id="promptInput" class="prompt-textarea" placeholder="Escribe tu idea..."></textarea>
            </div>
 
            <div class="tabs-container">
                <button class="tab-btn active" onclick="switchTab('camera', event)">Cámara</button>
                <button class="tab-btn" onclick="switchTab('style', event)">Estilo</button>
                <button class="tab-btn" onclick="switchTab('advanced', event)">Avanzado</button>
            </div>
 
            <div id="camera" class="controls-panel active">
                <div class="button-grid">
                    <button class="option-btn active" onclick="selectCamera('Frontal', event)">Frontal</button>
                    <button class="option-btn" onclick="selectCamera('Perfil', event)">Perfil</button>
                    <button class="option-btn" onclick="selectCamera('3/4', event)">3/4</button>
                    <button class="option-btn" onclick="selectCamera('Aereo', event)">Aéreo</button>
                </div>
            </div>
 
            <div id="style" class="controls-panel">
                <div class="button-grid">
                    <button class="option-btn" onclick="selectStyle('Pixar', event)">Pixar</button>
                    <button class="option-btn" onclick="selectStyle('Comic', event)">Comic</button>
                    <button class="option-btn" onclick="selectStyle('Foto', event)">Foto</button>
                    <button class="option-btn" onclick="selectStyle('Acuarela', event)">Acuarela</button>
                    <button class="option-btn" onclick="selectStyle('Cyberpunk', event)">Cyber</button>
                    <button class="option-btn" onclick="selectStyle('Dark', event)">Dark</button>
                </div>
            </div>
 
            <div id="advanced" class="controls-panel">
                <div>
                    <label class="control-label">Pasos: <span id="stepsVal">30</span></label>
                    <input type="range" min="20" max="50" value="30" class="slider" id="stepsSlider" oninput="document.getElementById('stepsVal').textContent = this.value">
                </div>
                <div style="margin-top: 8px;">
                    <label class="control-label">Guidance: <span id="guidanceVal">12.5</span></label>
                    <input type="range" min="5" max="20" step="0.5" value="12.5" class="slider" id="guidanceSlider" oninput="document.getElementById('guidanceVal').textContent = this.value">
                </div>
            </div>
 
            <button class="generate-btn" id="generateBtn" onclick="generateImage()">⚡ Generar</button>
            <div id="statusMsg" class="status-message"></div>
        </div>
 
        <!-- CANVAS CENTER -->
        <div class="canvas-center">
            <div class="toolbar">
                <div class="toolbar-left">
                    <button class="toolbar-btn" onclick="loadMarketplace()">Marketplace</button>
                    <button class="toolbar-btn" onclick="toggleHistory()">Historial</button>
                </div>
                <div style="display: flex; gap: 6px;">
                    <button class="toolbar-btn" onclick="downloadImage()">⬇️</button>
                    <button class="toolbar-btn" onclick="clearCanvas()">🗑️</button>
                </div>
            </div>
 
            <div class="canvas-area">
                <div class="canvas-display" id="canvasDisplay">
                    <div class="canvas-placeholder">
                        <div>✨</div>
                    </div>
                </div>
 
                <div class="canvas-actions">
                    <button onclick="generateImage()" style="background: linear-gradient(135deg, #06b6d4, #8b5cf6); color: white;">⚡ GENERAR</button>
                    <button onclick="downloadImage()" style="background: rgba(139, 92, 246, 0.2); color: #06b6d4;">⬇️ DESCARGAR</button>
                </div>
            </div>
        </div>
 
        <!-- SIDEBAR RIGHT (DESKTOP ONLY) -->
        <div class="sidebar-right">
            <div>
                <div class="sidebar-header">Marketplace - 100+ Prompts</div>
                
                <div class="filter-group">
                    <label class="filter-label">Categoría</label>
                    <select id="categoryFilter" class="filter-select" onchange="filterPrompts()">
                        <option value="">Todas</option>
                        <option value="Fantasy">Fantasy</option>
                        <option value="Sci-Fi">Sci-Fi</option>
                        <option value="Art">Art</option>
                        <option value="Nature">Nature</option>
                        <option value="Character">Character</option>
                        <option value="Architecture">Archit.</option>
                    </select>
                </div>
 
                <div class="filter-group">
                    <label class="filter-label">Tier</label>
                    <select id="tierFilter" class="filter-select" onchange="filterPrompts()">
                        <option value="">Todos</option>
                        <option value="standard">Standard</option>
                        <option value="premium">Premium</option>
                    </select>
                </div>
 
                <div id="promptsMarketplace" class="prompts-marketplace">
                    <div style="text-align: center; color: #666; padding: 12px; font-size: 9px;">Cargando...</div>
                </div>
            </div>
 
            <div>
                <div class="sidebar-header">Colores</div>
                <div class="color-palette" id="colorPalette"></div>
            </div>
        </div>
    </div>
 
    <script>
        let audioContext = null;
        let isSoundEnabled = true;
        const creativeIdeas = [
            "Un astronauta buscando vida extraterrestre en un planeta alienígena, atmósfera púrpura",
            "Un dragón hecho de cristal brillando bajo luz dorada, bosque encantado",
            "Un viajero en el tiempo saltando entre épocas diferentes",
            "Una ciudad submarina futurista con bioluminiscencia",
            "Un mago antiguo descifrando antiguos símbolos mágicos",
            "Un robot artista pintando un lienzo blanco",
            "Una biblioteca interdimensional con libros que emiten luz",
            "Un explorador descubriendo una ruina maya en la selva",
            "Una persona surfeando en nubes de colores en el cielo",
            "Un laboratorio alquímico antiguo con pociones brillantes"
        ];
 
        const state = {
            selectedCamera: 'Frontal',
            selectedStyle: 'Ninguno',
            currentImageUrl: null,
            isGenerating: false,
            allPrompts: [],
        };
 
        function toggleSound() {
            isSoundEnabled = !isSoundEnabled;
            document.getElementById('soundToggle').textContent = isSoundEnabled ? '🔊' : '🔇';
        }
 
        function playSound(type = 'generate') {
            if (!isSoundEnabled) return;
            if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const sounds = { generate: [440, 540, 640, 740], success: [523, 659, 784], click: [330] };
            const notes = sounds[type] || sounds.generate;
            let time = audioContext.currentTime;
            notes.forEach((freq) => {
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();
                osc.connect(gain); gain.connect(audioContext.destination);
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.2, time);
                gain.gain.exponentialRampToValueAtTime(0.01, time + 0.1);
                osc.start(time); osc.stop(time + 0.1);
                time += 0.12;
            });
        }
 
        function panicCreative() {
            playSound('click');
            const ideas = [];
            for (let i = 0; i < 3; i++) ideas.push(creativeIdeas[Math.floor(Math.random() * creativeIdeas.length)]);
            document.getElementById('promptInput').value = ideas.join(' + ');
            showStatus('3 Ideas! 🎲', 'success');
        }
 
        function switchTab(tabName, evt) {
            document.querySelectorAll('.controls-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            if (evt?.currentTarget) evt.currentTarget.classList.add('active');
        }
 
        function selectCamera(camera, evt) {
            state.selectedCamera = camera;
            document.querySelectorAll('#camera .option-btn').forEach(b => b.classList.remove('active'));
            if (evt?.currentTarget) evt.currentTarget.classList.add('active');
            playSound('click');
        }
 
        function selectStyle(style, evt) {
            state.selectedStyle = style;
            document.querySelectorAll('#style .option-btn').forEach(b => b.classList.remove('active'));
            if (evt?.currentTarget) evt.currentTarget.classList.add('active');
            playSound('click');
        }
 
        function toggleInpaint() {
            showStatus('Inpainting: Genera imagen primero', 'info');
        }
 
        async function loadMarketplace() {
            playSound('click');
            showStatus('Cargando...', 'info');
            try {
                const response = await fetch('/marketplace/prompts');
                const data = await response.json();
                if (data.success) {
                    state.allPrompts = data.prompts;
                    renderPrompts(data.prompts);
                    showStatus(`✅ ${data.total} prompts`, 'success');
                } else throw new Error(data.error);
            } catch (error) {
                showStatus('Error: ' + error.message, 'error');
            }
        }
 
        function renderPrompts(prompts) {
            const container = document.getElementById('promptsMarketplace');
            if (prompts.length === 0) {
                container.innerHTML = '<div style="color: #666; padding: 10px; text-align: center; font-size: 9px;">Sin resultados</div>';
                return;
            }
            container.innerHTML = prompts.map(p => `
                <div class="prompt-card">
                    <div class="prompt-card-title">${p.title}</div>
                    <div class="prompt-card-category">${p.category}</div>
                    <div class="prompt-card-price">$${p.price.toFixed(2)}</div>
                    <button style="width: 100%; margin-top: 6px; padding: 4px; background: rgba(139, 92, 246, 0.2); border: 1px solid rgba(139, 92, 246, 0.3); border-radius: 4px; color: #06b6d4; font-size: 9px; cursor: pointer;" onclick="usePrompt('${p.id}', \`${p.prompt.replace(/`/g, '\\`')}\`)">Usar</button>
                </div>
            `).join('');
        }
 
        function usePrompt(promptId, promptText) {
            document.getElementById('promptInput').value = promptText;
            showStatus('✅ Prompt cargado', 'success');
            playSound('success');
        }
 
        function filterPrompts() {
            const category = document.getElementById('categoryFilter').value;
            const tier = document.getElementById('tierFilter').value;
            let filtered = state.allPrompts;
            if (category) filtered = filtered.filter(p => p.category === category);
            if (tier) filtered = filtered.filter(p => p.tier === tier);
            renderPrompts(filtered);
        }
 
        async function generateImage() {
            const promptText = document.getElementById('promptInput').value.trim();
            if (!promptText) { showStatus('Escribe un prompt', 'error'); return; }
            if (state.isGenerating) return;
 
            state.isGenerating = true;
            const btn = document.getElementById('generateBtn');
            btn.classList.add('loading');
            btn.textContent = 'Generando...';
            playSound('generate');
 
            try {
                const response = await fetch('/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        prompt: promptText,
                        style: state.selectedStyle,
                        camera: state.selectedCamera,
                        num_inference_steps: parseInt(document.getElementById('stepsSlider').value),
                        guidance_scale: parseFloat(document.getElementById('guidanceSlider').value)
                    })
                });
 
                const data = await response.json();
                if (data.success) {
                    state.currentImageUrl = data.imageUrl;
                    document.getElementById('canvasDisplay').innerHTML = `<img src="${data.imageUrl}" alt="Generated">`;
                    playSound('success');
                    showStatus('¡Listo!', 'success');
                } else throw new Error(data.error);
            } catch (error) {
                showStatus('Error: ' + error.message, 'error');
            } finally {
                state.isGenerating = false;
                btn.classList.remove('loading');
                btn.textContent = '⚡ Generar';
            }
        }
 
        function toggleHistory() {
            showStatus('Historial activado', 'info');
        }
 
        function downloadImage() {
            if (!state.currentImageUrl) { showStatus('No hay imagen', 'error'); return; }
            const link = document.createElement('a');
            link.href = state.currentImageUrl;
            link.download = `merlin-${Date.now()}.png`;
            link.click();
            playSound('success');
            showStatus('¡Descargada!', 'success');
        }
 
        function clearCanvas() {
            document.getElementById('canvasDisplay').innerHTML = '<div class="canvas-placeholder"><div>✨</div><div>Escribe tu idea</div></div>';
            state.currentImageUrl = null;
        }
 
        function showStatus(text, type) {
            const msg = document.getElementById('statusMsg');
            msg.textContent = text;
            msg.className = `status-message show ${type}`;
            if (type !== 'error') setTimeout(() => msg.classList.remove('show'), 3000);
        }
 
        document.addEventListener('DOMContentLoaded', () => {
            console.log('✅ Merlin AI Móvil OK');
            loadMarketplace();
        });
    </script>
</body>
</html>
