<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merlin AI - Studio Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #0a0a0a;
            color: #e8e8e8;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow-x: hidden;
        }
 
        /* LAYOUT PRINCIPAL */
        .studio-container {
            display: grid;
            grid-template-columns: 280px 1fr 320px;
            gap: 0;
            height: 100vh;
        }
 
        /* ════ SIDEBAR IZQUIERDA ════ */
        .sidebar-left {
            background: linear-gradient(180deg, #1a1a2e 0%, #0f0f23 100%);
            border-right: 1px solid rgba(139, 92, 246, 0.2);
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
 
        .logo-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(139, 92, 246, 0.2);
        }
 
        .logo-header-box {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #06b6d4, #8b5cf6);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
 
        .logo-header span {
            font-weight: bold;
            font-size: 16px;
            color: #06b6d4;
        }
 
        .prompt-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
 
        .prompt-label {
            font-size: 12px;
            font-weight: 600;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
 
        .prompt-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 8px;
            padding: 12px;
            color: white;
            font-size: 13px;
            resize: vertical;
            min-height: 120px;
            font-family: inherit;
            transition: all 0.3s;
        }
 
        .prompt-input:focus {
            outline: none;
            border-color: #06b6d4;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.2);
        }
 
        .controls-tabs {
            display: flex;
            gap: 8px;
            border-bottom: 1px solid rgba(139, 92, 246, 0.2);
            padding-bottom: 12px;
        }
 
        .tab-btn {
            padding: 8px 12px;
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            border-bottom: 2px solid transparent;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
 
        .tab-btn.active {
            color: #06b6d4;
            border-bottom-color: #06b6d4;
        }
 
        .controls-panel {
            display: none;
            flex-direction: column;
            gap: 15px;
        }
 
        .controls-panel.active {
            display: flex;
        }
 
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
 
        .control-label {
            font-size: 11px;
            font-weight: 600;
            color: #999;
            text-transform: uppercase;
        }
 
        .control-value {
            font-size: 11px;
            color: #06b6d4;
            font-weight: 500;
        }
 
        .slider {
            width: 100%;
            height: 4px;
            border-radius: 2px;
            background: rgba(139, 92, 246, 0.2);
            outline: none;
            -webkit-appearance: none;
        }
 
        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #06b6d4;
            cursor: pointer;
            box-shadow: 0 0 8px rgba(6, 182, 212, 0.4);
        }
 
        .style-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
 
        .style-btn {
            background: rgba(139, 92, 246, 0.1);
            border: 1px solid rgba(139, 92, 246, 0.3);
            color: #999;
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
 
        .style-btn:hover {
            border-color: #06b6d4;
            color: #06b6d4;
            background: rgba(6, 182, 212, 0.1);
        }
 
        .style-btn.active {
            background: #06b6d4;
            color: black;
            border-color: #06b6d4;
        }
 
        .generate-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #06b6d4 0%, #8b5cf6 100%);
            border: none;
            color: white;
            font-weight: 700;
            font-size: 14px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
        }
 
        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(6, 182, 212, 0.3);
        }
 
        .generate-btn:active {
            transform: translateY(0);
        }
 
        .generate-btn.loading {
            opacity: 0.7;
            cursor: not-allowed;
        }
 
        /* ════ CANVAS CENTRAL ════ */
        .canvas-center {
            display: flex;
            flex-direction: column;
            gap: 0;
            background: #0a0a0a;
            border-right: 1px solid rgba(139, 92, 246, 0.2);
            border-left: 1px solid rgba(139, 92, 246, 0.2);
        }
 
        .toolbar {
            background: #1a1a2e;
            border-bottom: 1px solid rgba(139, 92, 246, 0.2);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
 
        .toolbar-left {
            display: flex;
            gap: 10px;
            align-items: center;
        }
 
        .toolbar-btn {
            padding: 8px 12px;
            background: rgba(139, 92, 246, 0.1);
            border: 1px solid rgba(139, 92, 246, 0.3);
            color: #999;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }
 
        .toolbar-btn:hover {
            border-color: #06b6d4;
            color: #06b6d4;
        }
 
        .canvas-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: auto;
            padding: 20px;
            position: relative;
        }
 
        .canvas-display {
            background: rgba(139, 92, 246, 0.05);
            border: 2px dashed rgba(6, 182, 212, 0.3);
            border-radius: 12px;
            width: 100%;
            max-width: 600px;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            font-size: 13px;
            text-align: center;
            overflow: hidden;
            position: relative;
        }
 
        .canvas-display img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
 
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(6, 182, 212, 0.2);
            border-top: 3px solid #06b6d4;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
 
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
 
        /* ════ SIDEBAR DERECHA ════ */
        .sidebar-right {
            background: linear-gradient(180deg, #1a1a2e 0%, #0f0f23 100%);
            border-left: 1px solid rgba(139, 92, 246, 0.2);
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
 
        .history-header {
            font-size: 12px;
            font-weight: 600;
            color: #06b6d4;
            text-transform: uppercase;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(139, 92, 246, 0.2);
        }
 
        .history-item {
            background: rgba(139, 92, 246, 0.1);
            border: 1px solid rgba(139, 92, 246, 0.2);
            border-radius: 8px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 12px;
        }
 
        .history-item:hover {
            border-color: #06b6d4;
            background: rgba(6, 182, 212, 0.1);
        }
 
        .history-thumb {
            width: 100%;
            height: 80px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 4px;
            margin-bottom: 8px;
            overflow: hidden;
        }
 
        .history-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
 
        .history-prompt {
            color: #999;
            font-size: 11px;
            line-height: 1.3;
            margin-bottom: 8px;
        }
 
        .history-time {
            color: #666;
            font-size: 10px;
        }
 
        ::-webkit-scrollbar {
            width: 8px;
        }
 
        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.3);
        }
 
        ::-webkit-scrollbar-thumb {
            background: rgba(6, 182, 212, 0.4);
            border-radius: 4px;
        }
 
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(6, 182, 212, 0.6);
        }
 
        @media (max-width: 1400px) {
            .studio-container {
                grid-template-columns: 250px 1fr;
            }
            .sidebar-right {
                display: none;
            }
        }
 
        @media (max-width: 900px) {
            .studio-container {
                grid-template-columns: 1fr;
            }
            .sidebar-left {
                display: none;
            }
        }
 
        .error-message {
            color: #ef4444;
            font-size: 12px;
            padding: 10px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 6px;
            margin-top: 10px;
        }
 
        .success-message {
            color: #10b981;
            font-size: 12px;
            padding: 10px;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 6px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="studio-container">
        
        <!-- ════ SIDEBAR IZQUIERDA ════ -->
        <div class="sidebar-left">
            <div class="logo-header">
                <div class="logo-header-box">✨</div>
                <span>Merlin AI</span>
            </div>
 
            <div class="prompt-section">
                <label class="prompt-label">Describe tu imagen</label>
                <textarea id="prompt" class="prompt-input" placeholder="Un dragón dorado volando sobre montañas, estilo Pixar..."></textarea>
            </div>
 
            <div class="controls-tabs">
                <button class="tab-btn active" onclick="switchTab('camera', event)">Cámara</button>
                <button class="tab-btn" onclick="switchTab('style', event)">Estilo</button>
                <button class="tab-btn" onclick="switchTab('advanced', event)">Avanzado</button>
            </div>
 
            <!-- TAB: CAMERA -->
            <div id="camera" class="controls-panel active">
                <div class="control-group">
                    <label class="control-label">Ángulo de Cámara</label>
                    <div class="style-grid">
                        <button class="style-btn active" onclick="selectCamera('Frontal', event)">Frontal</button>
                        <button class="style-btn" onclick="selectCamera('Perfil', event)">Perfil</button>
                        <button class="style-btn" onclick="selectCamera('3/4', event)">3/4</button>
                        <button class="style-btn" onclick="selectCamera('Aéreo', event)">Aéreo</button>
                    </div>
                </div>
            </div>
 
            <!-- TAB: STYLE -->
            <div id="style" class="controls-panel">
                <div class="control-group">
                    <label class="control-label">Estilo Artístico</label>
                    <div class="style-grid">
                        <button class="style-btn" onclick="selectStyle('Pixar', event)">Pixar</button>
                        <button class="style-btn" onclick="selectStyle('Cómic', event)">Cómic</button>
                        <button class="style-btn" onclick="selectStyle('Foto', event)">Foto</button>
                        <button class="style-btn" onclick="selectStyle('Acuarela', event)">Acuarela</button>
                    </div>
                </div>
            </div>
 
            <!-- TAB: ADVANCED -->
            <div id="advanced" class="controls-panel">
                <div class="control-group">
                    <label class="control-label">Pasos de Generación</label>
                    <div class="control-value" id="stepsValue">50</div>
                    <input type="range" min="20" max="100" value="50" class="slider" id="stepsSlider" oninput="document.getElementById('stepsValue').textContent = this.value">
                </div>
 
                <div class="control-group">
                    <label class="control-label">Guidance Scale</label>
                    <div class="control-value" id="guidanceValue">7.5</div>
                    <input type="range" min="0" max="20" step="0.5" value="7.5" class="slider" id="guidanceSlider" oninput="document.getElementById('guidanceValue').textContent = this.value">
                </div>
            </div>
 
            <button class="generate-btn" id="generateBtn" onclick="generateImage()">
                ✨ Generar Imagen
            </button>
 
            <div id="messageBox"></div>
        </div>
 
        <!-- ════ CANVAS CENTRAL ════ -->
        <div class="canvas-center">
            <div class="toolbar">
                <div class="toolbar-left">
                    <button class="toolbar-btn" onclick="loadMarketplace()">🏪 Marketplace</button>
                    <button class="toolbar-btn" onclick="toggleHistory()">📜 Historial</button>
                </div>
                <div>
                    <button class="toolbar-btn" onclick="alert('Opciones en desarrollo')">⚙️ Opciones</button>
                </div>
            </div>
 
            <div class="canvas-area">
                <div class="canvas-display" id="canvasDisplay">
                    <div style="text-align: center; color: #666;">
                        <div style="font-size: 48px; margin-bottom: 10px;">✨</div>
                        <div>Tu imagen aparecerá aquí</div>
                    </div>
                </div>
            </div>
        </div>
 
        <!-- ════ SIDEBAR DERECHA ════ -->
        <div class="sidebar-right">
            <div class="history-header">Historial</div>
            
            <div class="history-item">
                <div class="history-thumb" style="background: linear-gradient(135deg, #06b6d4, #8b5cf6); display: flex; align-items: center; justify-content: center; color: white; font-size: 30px;">✨</div>
                <div class="history-prompt">Listo para generar tu primera imagen</div>
                <div class="history-time">Ahora</div>
            </div>
 
            <div id="marketplaceList" style="display: none;">
                <div class="history-header">Prompts Disponibles</div>
                <div id="marketplacePlaceholder"></div>
            </div>
        </div>
    </div>
 
    <script>
        // STATE
        let state = {
            selectedCamera: 'Frontal',
            selectedStyle: 'Ninguno',
            currentImage: null,
            generating: false
        };
 
        // SWITCH TABS
        function switchTab(tabName, event) {
            event.target.parentElement.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            document.querySelectorAll('.controls-panel').forEach(p => p.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
        }
 
        // SELECT CAMERA
        function selectCamera(camera, event) {
            event.target.parentElement.querySelectorAll('.style-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            state.selectedCamera = camera;
        }
 
        // SELECT STYLE
        function selectStyle(style, event) {
            event.target.parentElement.querySelectorAll('.style-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            state.selectedStyle = style;
        }
 
        // GENERATE IMAGE
        async function generateImage() {
            const prompt = document.getElementById('prompt').value;
            const btn = document.getElementById('generateBtn');
            const canvas = document.getElementById('canvasDisplay');
            const messageBox = document.getElementById('messageBox');
 
            if (!prompt) {
                showMessage('Escribe un prompt para generar', 'error');
                return;
            }
 
            if (state.generating) return;
 
            state.generating = true;
            btn.classList.add('loading');
            btn.textContent = '⏳ Generando...';
            canvas.innerHTML = '<div class="loading-spinner"></div>';
            messageBox.innerHTML = '';
 
            try {
                const response = await fetch('/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        prompt: prompt,
                        style: state.selectedStyle,
                        camera: state.selectedCamera
                    })
                });
 
                const data = await response.json();
 
                if (data.success) {
                    state.currentImage = data.imageUrl;
                    canvas.innerHTML = `<img src="${data.imageUrl}" alt="Generada">`;
                    showMessage('✨ Imagen generada con éxito', 'success');
                } else {
                    showMessage('❌ Error: ' + data.error, 'error');
                    canvas.innerHTML = '<div style="text-align: center; color: #666;"><div style="font-size: 48px; margin-bottom: 10px;">❌</div><div>Error al generar</div></div>';
                }
            } catch (error) {
                showMessage('❌ Error de conexión: ' + error.message, 'error');
                canvas.innerHTML = '<div style="text-align: center; color: #666;"><div style="font-size: 48px; margin-bottom: 10px;">❌</div><div>Error de conexión</div></div>';
            } finally {
                state.generating = false;
                btn.classList.remove('loading');
                btn.textContent = '✨ Generar Imagen';
            }
        }
 
        // LOAD MARKETPLACE
        async function loadMarketplace() {
            const list = document.getElementById('marketplaceList');
            const placeholder = document.getElementById('marketplacePlaceholder');
 
            if (list.style.display === 'none') {
                try {
                    const response = await fetch('/marketplace/prompts');
                    const data = await response.json();
 
                    if (data.success && data.prompts.length > 0) {
                        placeholder.innerHTML = data.prompts.map(p => `
                            <div class="history-item">
                                <div style="text-align: center; font-size: 30px; margin-bottom: 8px;">${p.image}</div>
                                <div class="history-prompt"><strong>${p.title}</strong></div>
                                <div class="history-time">$${p.price} - por ${p.author}</div>
                            </div>
                        `).join('');
                    }
                    list.style.display = 'block';
                } catch (error) {
                    alert('Error cargando marketplace: ' + error.message);
                }
            } else {
                list.style.display = 'none';
            }
        }
 
        // TOGGLE HISTORY
        function toggleHistory() {
            alert('Historial en desarrollo - guardaremos tus últimas generaciones');
        }
 
        // SHOW MESSAGE
        function showMessage(text, type) {
            const messageBox = document.getElementById('messageBox');
            messageBox.innerHTML = `<div class="${type}-message">${text}</div>`;
            setTimeout(() => {
                messageBox.innerHTML = '';
            }, 5000);
        }
 
        // INITIAL
        console.log('✅ Merlin AI Frontend cargado');
        console.log('📍 Conectado a servidor:', window.location.origin);
    </script>
</body>
</html>
