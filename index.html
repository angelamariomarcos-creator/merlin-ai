<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merlin AI - Generador de Imágenes</title>
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        /* (Tu CSS permanece igual) */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; color: #e8e8e8; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow-x: hidden; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideIn { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .studio-container { display: grid; grid-template-columns: 300px 1fr 350px; gap: 0; height: 100vh; }
        .sidebar-left { background: linear-gradient(180deg, #1a1a2e 0%, #0f0f23 100%); border-right: 1px solid rgba(139, 92, 246, 0.2); overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 24px; animation: slideIn 0.5s ease; }
        .logo-section { display: flex; align-items: center; gap: 12px; padding-bottom: 20px; border-bottom: 1px solid rgba(139, 92, 246, 0.2); }
        .logo-icon { width: 44px; height: 44px; background: linear-gradient(135deg, #06b6d4 0%, #8b5cf6 100%); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 22px; box-shadow: 0 0 20px rgba(6, 182, 212, 0.3); }
        .logo-text h1 { font-size: 18px; font-weight: 700; color: #06b6d4; }
        .logo-text p { font-size: 10px; color: #666; }
        .sound-toggle { position: absolute; top: 20px; right: 20px; background: rgba(139, 92, 246, 0.2); border: 1px solid rgba(139, 92, 246, 0.3); color: #06b6d4; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; transition: all 0.3s; z-index: 50; }
        .prompt-box { display: flex; flex-direction: column; gap: 10px; }
        .prompt-label { font-size: 11px; font-weight: 700; color: #06b6d4; }
        .prompt-textarea { background: rgba(255, 255, 255, 0.04); border: 1.5px solid rgba(139, 92, 246, 0.25); border-radius: 10px; padding: 14px; color: #e8e8e8; font-size: 13px; min-height: 100px; resize: vertical; font-family: inherit; transition: all 0.3s; }
        .prompt-textarea:focus { outline: none; border-color: #06b6d4; background: rgba(255, 255, 255, 0.08); }
        .quick-actions { display: flex; gap: 8px; margin-bottom: 12px; }
        .quick-btn { flex: 1; padding: 8px; background: rgba(139, 92, 246, 0.1); border: 1px solid rgba(139, 92, 246, 0.25); color: #06b6d4; border-radius: 6px; font-size: 11px; cursor: pointer; transition: all 0.3s; }
        .tabs-container { display: flex; gap: 8px; border-bottom: 1px solid rgba(139, 92, 246, 0.2); padding-bottom: 12px; }
        .tab-btn { padding: 8px 12px; background: none; border: none; color: #666; cursor: pointer; font-size: 11px; font-weight: 700; border-bottom: 2px solid transparent; transition: all 0.3s; }
        .tab-btn.active { color: #06b6d4; border-bottom-color: #06b6d4; }
        .controls-panel { display: none; flex-direction: column; gap: 16px; }
        .controls-panel.active { display: flex; animation: fadeIn 0.3s; }
        .control-group { display: flex; flex-direction: column; gap: 10px; }
        .control-label { font-size: 10px; font-weight: 700; color: #999; }
        .control-value { font-size: 12px; color: #06b6d4; font-weight: 700; }
        .button-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .option-btn { padding: 10px 12px; background: rgba(139, 92, 246, 0.08); border: 1px solid rgba(139, 92, 246, 0.25); border-radius: 8px; color: #999; font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .option-btn.active { background: linear-gradient(135deg, #06b6d4, #8b5cf6); color: white; border-color: transparent; }
        .slider { width: 100%; height: 5px; border-radius: 3px; background: rgba(139, 92, 246, 0.15); outline: none; cursor: pointer; }
        .slider::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #06b6d4; }
        .generate-btn { width: 100%; padding: 16px; background: linear-gradient(135deg, #06b6d4, #8b5cf6); border: none; border-radius: 10px; color: white; font-weight: 700; font-size: 13px; cursor: pointer; transition: all 0.3s; margin-top: 8px; }
        .generate-btn.loading { opacity: 0.7; cursor: not-allowed; }
        .status-message { padding: 12px; border-radius: 8px; font-size: 12px; margin-top: 8px; display: none; }
        .status-message.show { display: block; }
        .status-message.success { background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.3); color: #10b981; }
        .status-message.error { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); color: #ef4444; }
        .canvas-center { display: flex; flex-direction: column; background: #0a0a0a; border-left: 1px solid rgba(139, 92, 246, 0.2); border-right: 1px solid rgba(139, 92, 246, 0.2); overflow: hidden; }
        .toolbar { background: rgba(26, 26, 46, 0.8); border-bottom: 1px solid rgba(139, 92, 246, 0.2); padding: 16px 24px; display: flex; justify-content: space-between; }
        .toolbar-btn { padding: 8px 12px; background: rgba(139, 92, 246, 0.08); border: 1px solid rgba(139, 92, 246, 0.25); border-radius: 8px; color: #999; font-size: 11px; cursor: pointer; }
        .canvas-area { flex: 1; display: flex; align-items: center; justify-content: center; padding: 24px; }
        .canvas-display { width: 100%; max-width: 700px; aspect-ratio: 4/3; background: rgba(139, 92, 246, 0.05); border: 2px dashed rgba(6, 182, 212, 0.3); border-radius: 16px; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        .canvas-display img { width: 100%; height: 100%; object-fit: cover; }
        .sidebar-right { background: linear-gradient(180deg, #1a1a2e, #0f0f23); border-left: 1px solid rgba(139, 92, 246, 0.2); padding: 24px; }
        .sidebar-header { font-size: 11px; font-weight: 700; color: #06b6d4; padding-bottom: 12px; border-bottom: 1px solid rgba(139, 92, 246, 0.2); margin-bottom: 12px;}
    </style>
</head>
<body>
    <button class="sound-toggle" id="soundToggle" onclick="toggleSound()">🔊</button>

    <div class="studio-container">
        <div class="sidebar-left">
            <div class="logo-section">
                <div class="logo-icon">✨</div>
                <div class="logo-text"><h1>MERLIN AI</h1><p>Generador de imágenes</p></div>
            </div>
            <div class="quick-actions">
                <button class="quick-btn" onclick="panicCreative()">🎲 Pánico</button>
                <button class="quick-btn" onclick="toggleInpaint()">✏️ Inpaint</button>
            </div>
            <div class="prompt-box">
                <label class="prompt-label">Tu idea (Prompt)</label>
                <textarea id="promptInput" class="prompt-textarea" placeholder="Escribe tu idea..."></textarea>
            </div>
            <div class="tabs-container">
                <button class="tab-btn active" onclick="switchTab('camera', event)">Cámara</button>
                <button class="tab-btn" onclick="switchTab('style', event)">Estilo</button>
                <button class="tab-btn" onclick="switchTab('advanced', event)">Avanzado</button>
            </div>
            <div id="camera" class="controls-panel active">
                <div class="control-group">
                    <label class="control-label">Tipo de Cámara</label>
                    <div class="button-grid">
                        <button class="option-btn active" onclick="selectCamera('Frontal', event)">Frontal</button>
                        <button class="option-btn" onclick="selectCamera('Perfil', event)">Perfil</button>
                        <button class="option-btn" onclick="selectCamera('3/4', event)">3/4</button>
                        <button class="option-btn" onclick="selectCamera('Aereo', event)">Aéreo</button>
                    </div>
                </div>
            </div>
            <div id="style" class="controls-panel">
                <div class="control-group">
                    <label class="control-label">Estilo Artístico</label>
                    <div class="button-grid">
                        <button class="option-btn" onclick="selectStyle('Pixar', event)">Pixar</button>
                        <button class="option-btn" onclick="selectStyle('Comic', event)">Comic</button>
                        <button class="option-btn" onclick="selectStyle('Foto', event)">Foto Real</button>
                        <button class="option-btn" onclick="selectStyle('Acuarela', event)">Acuarela</button>
                    </div>
                </div>
            </div>
            <div id="advanced" class="controls-panel">
                <div class="control-group">
                    <label class="control-label">Pasos</label>
                    <div class="control-value"><span id="stepsVal">30</span></div>
                    <input type="range" min="20" max="50" value="30" class="slider" id="stepsSlider" oninput="document.getElementById('stepsVal').textContent = this.value">
                </div>
            </div>
            <button class="generate-btn" id="generateBtn" onclick="generateImage()">⚡ Generar</button>
            <div id="statusMsg" class="status-message"></div>
        </div>

        <div class="canvas-center">
            <div class="toolbar">
                <div class="toolbar-left">
                    <button class="toolbar-btn" onclick="downloadImage()">⬇️ Descargar</button>
                </div>
            </div>
            <div class="canvas-area">
                <div class="canvas-display" id="canvasDisplay">
                    <div class="canvas-placeholder">✨ Escribe tu idea y haz clic en GENERAR</div>
                </div>
            </div>
        </div>

        <div class="sidebar-right">
            <div class="sidebar-header">Historial Reciente</div>
            <div id="historyList"></div>
        </div>
    </div>

    <script>
        // LÓGICA DE ORQUESTACIÓN (GEMINI)
        async function getExpandedPrompt(userPrompt) {
            try {
                const response = await fetch('/expand-prompt', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userPrompt })
                });
                const data = await response.json();
                return data.expandedPrompt || userPrompt;
            } catch (error) {
                console.error("Error en orquestación:", error);
                return userPrompt;
            }
        }

        const state = {
            selectedCamera: 'Frontal',
            selectedStyle: 'Ninguno',
            currentImageUrl: null,
            isGenerating: false,
            history: JSON.parse(localStorage.getItem('merlinHistory')) || []
        };

        // GENERAR IMAGEN
        async function generateImage() {
            const rawPrompt = document.getElementById('promptInput').value.trim();
            if (!rawPrompt) return;

            if (state.isGenerating) return;
            state.isGenerating = true;
            
            const btn = document.getElementById('generateBtn');
            btn.classList.add('loading');
            btn.textContent = '🧠 Gemini optimizando...';

            // Paso 1: Orquestación
            const finalPrompt = await getExpandedPrompt(rawPrompt);
            btn.textContent = '🎨 Generando...';

            try {
                const response = await fetch('/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        prompt: finalPrompt,
                        style: state.selectedStyle,
                        camera: state.selectedCamera,
                        steps: document.getElementById('stepsSlider').value
                    })
                });

                const data = await response.json();
                if (data.success) {
                    state.currentImageUrl = data.imageUrl;
                    document.getElementById('canvasDisplay').innerHTML = `<img src="${data.imageUrl}">`;
                    showStatus('¡Imagen creada!', 'success');
                }
            } catch (e) {
                showStatus('Error al generar', 'error');
            } finally {
                state.isGenerating = false;
                btn.classList.remove('loading');
                btn.textContent = '⚡ Generar';
            }
        }

        function downloadImage() {
            if (!state.currentImageUrl) return;
            const link = document.createElement('a');
            link.href = state.currentImageUrl;
            link.download = `merlin-ai-${Date.now()}.png`;
            link.click();
        }

        function showStatus(msg, type) {
            const el = document.getElementById('statusMsg');
            el.textContent = msg;
            el.className = `status-message show ${type}`;
            setTimeout(() => el.classList.remove('show'), 3000);
        }
        
        function switchTab(t, e) { /* ... lógica de tabs ... */ }
        function selectCamera(c, e) { state.selectedCamera = c; }
        function selectStyle(s, e) { state.selectedStyle = s; }
        function toggleSound() { /* ... */ }
        function panicCreative() { /* ... */ }
        function toggleInpaint() { /* ... */ }
    </script>
</body>
</html>
