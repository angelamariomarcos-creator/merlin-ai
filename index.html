<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merlin AI - Generador Premium</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow-x: hidden; }
        body { background: #0a0a0a; color: #e8e8e8; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideIn { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .studio-container { display: grid; grid-template-columns: 1fr; gap: 0; height: 100vh; width: 100%; }
        .sidebar-left { background: linear-gradient(180deg, #1a1a2e 0%, #0f0f23 100%); border-right: 1px solid rgba(139, 92, 246, 0.2); overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 16px; animation: slideIn 0.5s ease; height: auto; max-height: 45vh; border-bottom: 1px solid rgba(139, 92, 246, 0.2); }
        .logo-section { display: flex; align-items: center; gap: 12px; padding-bottom: 12px; border-bottom: 1px solid rgba(139, 92, 246, 0.2); }
        .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, #06b6d4 0%, #8b5cf6 100%); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
        .logo-text h1 { font-size: 16px; font-weight: 700; color: #06b6d4; }
        .logo-text p { font-size: 9px; color: #666; }

        .sound-toggle { position: fixed; top: 12px; right: 12px; background: rgba(139, 92, 246, 0.2); border: 1px solid rgba(139, 92, 246, 0.3); color: #06b6d4; border-radius: 50%; width: 36px; height: 36px; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; z-index: 50; }

        .prompt-box { display: flex; flex-direction: column; gap: 8px; }
        .prompt-label { font-size: 10px; font-weight: 700; color: #06b6d4; }
        .prompt-textarea { background: rgba(255, 255, 255, 0.04); border: 1.5px solid rgba(139, 92, 246, 0.25); border-radius: 8px; padding: 10px; color: #e8e8e8; font-size: 12px; min-height: 70px; resize: vertical; font-family: inherit; width: 100%; }
        .prompt-textarea:focus { outline: none; border-color: #06b6d4; background: rgba(255, 255, 255, 0.08); }

        .quick-actions { display: flex; gap: 8px; margin-bottom: 8px; }
        .quick-btn { flex: 1; padding: 8px; background: rgba(139, 92, 246, 0.1); border: 1px solid rgba(139, 92, 246, 0.25); color: #06b6d4; border-radius: 6px; font-size: 10px; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .quick-btn:active { background: rgba(139, 92, 246, 0.2); border-color: #06b6d4; }

        .tabs-container { display: flex; gap: 6px; border-bottom: 1px solid rgba(139, 92, 246, 0.2); padding-bottom: 8px; overflow-x: auto; }
        .tab-btn { padding: 6px 10px; background: none; border: none; color: #666; cursor: pointer; font-size: 10px; font-weight: 700; border-bottom: 2px solid transparent; white-space: nowrap; }
        .tab-btn.active { color: #06b6d4; border-bottom-color: #06b6d4; }

        .controls-panel { display: none; flex-direction: column; gap: 12px; }
        .controls-panel.active { display: flex; animation: fadeIn 0.3s; }
        .button-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .option-btn { padding: 8px 10px; background: rgba(139, 92, 246, 0.08); border: 1px solid rgba(139, 92, 246, 0.25); border-radius: 6px; color: #999; font-size: 10px; font-weight: 600; cursor: pointer; }
        .option-btn:active { border-color: #06b6d4; color: #06b6d4; }
        .option-btn.active { background: linear-gradient(135deg, #06b6d4, #8b5cf6); color: white; border-color: transparent; }

        .slider { width: 100%; height: 4px; border-radius: 2px; background: rgba(139, 92, 246, 0.15); outline: none; cursor: pointer; }
        .slider::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #06b6d4; }

        .generate-btn { width: 100%; padding: 12px; background: linear-gradient(135deg, #06b6d4, #8b5cf6); border: none; border-radius: 8px; color: white; font-weight: 700; font-size: 12px; cursor: pointer; margin-top: 6px; }
        .generate-btn:active:not(.loading) { transform: scale(0.98); }
        .generate-btn.loading { opacity: 0.7; cursor: not-allowed; }

        .status-message { padding: 10px; border-radius: 6px; font-size: 11px; margin-top: 6px; display: none; }
        .status-message.show { display: block; animation: fadeIn 0.3s; }
        .status-message.success { background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.3); color: #10b981; }
        .status-message.error { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); color: #ef4444; }
        .status-message.info { background: rgba(6, 182, 212, 0.1); border: 1px solid rgba(6, 182, 212, 0.3); color: #06b6d4; }

        .canvas-center { display: flex; flex-direction: column; background: #0a0a0a; overflow: hidden; flex: 1; min-height: 0; }
        .toolbar { background: rgba(26, 26, 46, 0.8); border-bottom: 1px solid rgba(139, 92, 246, 0.2); padding: 12px; display: flex; justify-content: space-between; gap: 8px; flex-wrap: wrap; }
        .toolbar-left { display: flex; gap: 6px; flex-wrap: wrap; }
        .toolbar-btn { padding: 6px 10px; background: rgba(139, 92, 246, 0.08); border: 1px solid rgba(139, 92, 246, 0.25); border-radius: 6px; color: #999; font-size: 10px; cursor: pointer; white-space: nowrap; }
        .toolbar-btn:active { border-color: #06b6d4; color: #06b6d4; }

        .canvas-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 12px; overflow-y: auto; background: linear-gradient(135deg, rgba(15, 15, 35, 0.5), rgba(10, 10, 26, 0.5)); gap: 12px; min-height: 0; }
        .canvas-display { width: 100%; height: 250px; background: rgba(139, 92, 246, 0.05); border: 2px dashed rgba(6, 182, 212, 0.3); border-radius: 12px; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; flex-shrink: 0; }
        .canvas-display img { width: 100%; height: 100%; object-fit: cover; }
        .canvas-placeholder { display: flex; flex-direction: column; align-items: center; gap: 8px; color: #555; text-align: center; padding: 12px; font-size: 32px; }
        .spinner { width: 36px; height: 36px; border: 3px solid rgba(6, 182, 212, 0.2); border-top-color: #06b6d4; border-radius: 50%; animation: spin 1s linear infinite; }

        .canvas-actions { display: flex; gap: 8px; width: 100%; flex-wrap: wrap; justify-content: center; flex-shrink: 0; }
        .canvas-actions button { flex: 1; min-width: 90px; padding: 14px; background: linear-gradient(135deg, #06b6d4, #8b5cf6); color: white; border: none; border-radius: 8px; font-weight: 700; font-size: 13px; cursor: pointer; }
        .canvas-actions button:active { transform: scale(0.98); }

        .extra-actions { display: flex; gap: 8px; width: 100%; flex-wrap: wrap; justify-content: center; flex-shrink: 0; }
        .extra-btn { flex: 1; min-width: 80px; padding: 10px; background: rgba(139, 92, 246, 0.2); color: #06b6d4; border: 1px solid rgba(139, 92, 246, 0.3); border-radius: 8px; font-weight: 700; font-size: 12px; cursor: pointer; }
        .extra-btn:active { background: rgba(139, 92, 246, 0.3); }

        .sidebar-right { background: linear-gradient(180deg, #1a1a2e, #0f0f23); border-top: 1px solid rgba(139, 92, 246, 0.2); overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 16px; height: auto; max-height: 35vh; }
        .sidebar-header { font-size: 10px; font-weight: 700; color: #06b6d4; padding-bottom: 10px; border-bottom: 1px solid rgba(139, 92, 246, 0.2); }

        .filter-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
        .filter-label { font-size: 9px; color: #06b6d4; font-weight: 700; }
        .filter-select { background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(139, 92, 246, 0.25); border-radius: 4px; padding: 6px; color: #e8e8e8; font-size: 10px; width: 100%; }

        .prompts-marketplace { display: flex; flex-direction: column; gap: 8px; max-height: 250px; overflow-y: auto; }
        .prompt-card { background: rgba(139, 92, 246, 0.08); border: 1px solid rgba(139, 92, 246, 0.2); border-radius: 6px; padding: 8px; font-size: 9px; }
        .prompt-card:active { border-color: #06b6d4; background: rgba(6, 182, 212, 0.1); }
        .prompt-card-title { color: #06b6d4; font-weight: 700; margin-bottom: 3px; }
        .prompt-card-price { color: #10b981; font-weight: 700; }

        .gallery { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 12px; }
        .gallery-item { width: 100%; aspect-ratio: 4/3; background: rgba(139, 92, 246, 0.05); border: 1px solid rgba(139, 92, 246, 0.2); border-radius: 8px; overflow: hidden; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.3); }
        ::-webkit-scrollbar-thumb { background: rgba(6, 182, 212, 0.3); border-radius: 3px; }

        @media (min-width: 768px) {
            .studio-container { grid-template-columns: 280px 1fr 320px; }
            .sidebar-left { max-height: 100vh; height: 100vh; border-bottom: none; padding: 20px; }
            .sidebar-right { max-height: 100vh; height: 100vh; border-top: none; border-left: 1px solid rgba(139, 92, 246, 0.2); }
        }
        @media (max-width: 767px) {
            .sidebar-right { display: none; }
        }
    </style>
</head>
<body>
    <button class="sound-toggle" id="soundToggle" onclick="toggleSound()">🔊</button>

    <div class="studio-container">
        <div class="sidebar-left">
            <div class="logo-section">
                <div class="logo-icon">✨</div>
                <div class="logo-text">
                    <h1>MERLIN AI</h1>
                    <p>Premium</p>
                </div>
            </div>

            <div class="quick-actions">
                <button class="quick-btn" onclick="panicCreative()">🎲 Pánico</button>
                <button class="quick-btn" onclick="openMarketplace()">🛍️ Market</button>
            </div>

            <div class="prompt-box">
                <label class="prompt-label">Tu idea</label>
                <textarea id="promptInput" class="prompt-textarea" placeholder="Escribe tu idea..."></textarea>
            </div>

            <div class="tabs-container">
                <button class="tab-btn active" onclick="switchTab('camera', event)">Cámara</button>
                <button class="tab-btn" onclick="switchTab('style', event)">Estilo</button>
                <button class="tab-btn" onclick="switchTab('advanced', event)">Avanzado</button>
                <button class="tab-btn" onclick="switchTab('marketplace', event)">Market</button>
            </div>

            <div id="camera" class="controls-panel active">
                <div class="button-grid">
                    <button class="option-btn active" onclick="selectCamera('Frontal', event)">Frontal</button>
                    <button class="option-btn" onclick="selectCamera('Perfil', event)">Perfil</button>
                    <button class="option-btn" onclick="selectCamera('3/4', event)">3/4</button>
                    <button class="option-btn" onclick="selectCamera('Aereo', event)">Aéreo</button>
                </div>
            </div>

            <div id="style" class="controls-panel">
                <div class="button-grid">
                    <button class="option-btn" onclick="selectStyle('Pixar', event)">Pixar</button>
                    <button class="option-btn" onclick="selectStyle('Comic', event)">Comic</button>
                    <button class="option-btn" onclick="selectStyle('Foto', event)">Foto</button>
                    <button class="option-btn" onclick="selectStyle('Acuarela', event)">Acuarela</button>
                    <button class="option-btn" onclick="selectStyle('Cyberpunk', event)">Cyber</button>
                    <button class="option-btn" onclick="selectStyle('Dark', event)">Dark</button>
                </div>
            </div>

            <div id="advanced" class="controls-panel">
                <label class="prompt-label">Pasos: <span id="stepsVal">30</span></label>
                <input type="range" min="20" max="50" value="30" class="slider" id="stepsSlider" oninput="document.getElementById('stepsVal').textContent = this.value">
                <label class="prompt-label">Guidance: <span id="guidanceVal">12.5</span></label>
                <input type="range" min="5" max="20" step="0.5" value="12.5" class="slider" id="guidanceSlider" oninput="document.getElementById('guidanceVal').textContent = this.value">
            </div>

            <div id="marketplace" class="controls-panel">
                <div class="filter-group">
                    <label class="filter-label">Categoría</label>
                    <select id="categoryFilterMobile" class="filter-select" onchange="filterPrompts()">
                        <option value="">Todas</option>
                        <option value="Fantasy">Fantasy</option>
                        <option value="Sci-Fi">Sci-Fi</option>
                        <option value="Art">Art</option>
                        <option value="Nature">Nature</option>
                    </select>
                </div>
                <div id="promptsMarketplaceMobile" class="prompts-marketplace">
                    <div style="text-align: center; color: #666; font-size: 9px;">Cargando...</div>
                </div>
            </div>

            <button class="generate-btn" id="generateBtn" onclick="generateImage()">⚡ Generar</button>
            <div id="statusMsg" class="status-message"></div>
        </div>

        <div class="canvas-center">
            <div class="toolbar">
                <div class="toolbar-left">
                    <button class="toolbar-btn" onclick="loadMarketplace()">Marketplace</button>
                </div>
                <div style="display: flex; gap: 6px;">
                    <button class="toolbar-btn" onclick="downloadImage()">⬇️ DL</button>
                    <button class="toolbar-btn" onclick="clearCanvas()">🗑️</button>
                </div>
            </div>

            <div class="canvas-area">
                <div class="canvas-display" id="canvasDisplay">
                    <div class="canvas-placeholder">✨</div>
                </div>

                <div class="canvas-actions">
                    <button onclick="generateImage()">⚡ GENERAR</button>
                    <button onclick="downloadImage()">⬇️ DESCARGA</button>
                </div>

                <div class="extra-actions" id="extraActions">
                    <button class="extra-btn" onclick="upscaleImage()">⬆️ 4x</button>
                    <button class="extra-btn" onclick="generateBatch()">🎬 Batch</button>
                    <button class="extra-btn" onclick="exportSocial()">📸 Redes</button>
                </div>

                <div class="gallery" id="gallery"></div>
            </div>
        </div>

        <div class="sidebar-right">
            <div>
                <div class="sidebar-header">Marketplace 100+</div>
                <div class="filter-group">
                    <label class="filter-label">Categoría</label>
                    <select id="categoryFilter" class="filter-select" onchange="filterPrompts()">
                        <option value="">Todas</option>
                        <option value="Fantasy">Fantasy</option>
                        <option value="Sci-Fi">Sci-Fi</option>
                        <option value="Art">Art</option>
                        <option value="Nature">Nature</option>
                    </select>
                </div>
                <div id="promptsMarketplace" class="prompts-marketplace">
                    <div style="text-align: center; color: #666; font-size: 9px;">Cargando...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let isSoundEnabled = true;
        const creativeIdeas = [
            "Un astronauta explorando un planeta alienígena",
            "Un dragón de hielo volando sobre montañas nevadas",
            "Una ciudad futurista con rascacielos de cristal",
            "Un bosque mágico con árboles bioluminiscentes",
            "Un robot artista pintando en un lienzo",
            "Una cascada poderosa en medio de la selva",
            "Un mago antiguo rodeado de magia azul",
            "Una estación espacial orbitando un planeta",
            "Un castillo flotando en las nubes",
            "Un fénix renaciendo de las cenizas"
        ];

        const state = {
            selectedCamera: 'Frontal',
            selectedStyle: 'Ninguno',
            currentImageUrl: null,
            isGenerating: false,
            allPrompts: [],
            batchImages: []
        };

        function toggleSound() {
            isSoundEnabled = !isSoundEnabled;
            document.getElementById('soundToggle').textContent = isSoundEnabled ? '🔊' : '🔇';
        }

        function playSound(type = 'click') {
            if (!isSoundEnabled) return;
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                const sounds = { generate: [440, 540, 640, 740], success: [523, 659, 784], click: [330] };
                const notes = sounds[type] || [440];
                let time = audioCtx.currentTime;
                notes.forEach((freq) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.frequency.value = freq;
                    gain.gain.setValueAtTime(0.1, time);
                    gain.gain.exponentialRampToValueAtTime(0.01, time + 0.1);
                    osc.start(time);
                    osc.stop(time + 0.1);
                    time += 0.12;
                });
            } catch (e) {
                console.log('Audio error (ignorado):', e.message);
            }
        }

        function panicCreative() {
            playSound('click');
            const ideas = [];
            for (let i = 0; i < 3; i++) ideas.push(creativeIdeas[Math.floor(Math.random() * creativeIdeas.length)]);
            document.getElementById('promptInput').value = ideas.join(' + ');
            showStatus('3 Ideas! 🎲', 'success');
        }

        function switchTab(tabName, evt) {
            document.querySelectorAll('.controls-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            if (evt?.currentTarget) evt.currentTarget.classList.add('active');
        }

        function selectCamera(camera, evt) {
            state.selectedCamera = camera;
            document.querySelectorAll('#camera .option-btn').forEach(b => b.classList.remove('active'));
            if (evt?.currentTarget) evt.currentTarget.classList.add('active');
            playSound('click');
        }

        function selectStyle(style, evt) {
            state.selectedStyle = style;
            document.querySelectorAll('#style .option-btn').forEach(b => b.classList.remove('active'));
            if (evt?.currentTarget) evt.currentTarget.classList.add('active');
            playSound('click');
        }

        async function loadMarketplace() {
            playSound('click');
            showStatus('Cargando marketplace...', 'info');
            try {
                const response = await fetch('/marketplace/prompts');
                const data = await response.json();
                if (data.success) {
                    state.allPrompts = data.prompts;
                    renderPrompts(data.prompts);
                    showStatus(`✅ ${data.total} prompts`, 'success');
                }
            } catch (error) {
                showStatus('Error: ' + error.message, 'error');
            }
        }

        function renderPrompts(prompts) {
            const container = document.getElementById('promptsMarketplace');
            const containerMobile = document.getElementById('promptsMarketplaceMobile');
            
            if (prompts.length === 0) {
                container.innerHTML = '<div style="color: #666; font-size: 9px;">Sin resultados</div>';
                containerMobile.innerHTML = '<div style="color: #666; font-size: 9px;">Sin resultados</div>';
                return;
            }

            const html = prompts.map(p => `
                <div class="prompt-card">
                    <div class="prompt-card-title">${p.title}</div>
                    <div class="prompt-card-price">$${p.price.toFixed(2)}</div>
                    <button style="width: 100%; margin-top: 6px; padding: 4px; background: rgba(139, 92, 246, 0.2); border: 1px solid rgba(139, 92, 246, 0.3); border-radius: 4px; color: #06b6d4; font-size: 9px; cursor: pointer;" onclick="usePrompt(\`${p.prompt.replace(/`/g, '\\`')}\`)">Usar</button>
                </div>
            `).join('');

            container.innerHTML = html;
            containerMobile.innerHTML = html;
        }

        function usePrompt(promptText) {
            document.getElementById('promptInput').value = promptText;
            showStatus('✅ Prompt cargado', 'success');
            playSound('success');
        }

        function filterPrompts() {
            const category = document.getElementById('categoryFilter')?.value || document.getElementById('categoryFilterMobile')?.value;
            let filtered = state.allPrompts;
            if (category) filtered = filtered.filter(p => p.category === category);
            renderPrompts(filtered);
        }

        function openMarketplace() {
            loadMarketplace();
            switchTab('marketplace', null);
        }

        async function generateImage() {
            const promptText = document.getElementById('promptInput').value.trim();
            if (!promptText) {
                showStatus('Escribe un prompt', 'error');
                return;
            }

            state.isGenerating = true;
            const btn = document.getElementById('generateBtn');
            btn.classList.add('loading');
            btn.textContent = 'Generando...';
            playSound('generate');

            try {
                const response = await fetch('/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        prompt: promptText,
                        style: state.selectedStyle,
                        camera: state.selectedCamera,
                        num_inference_steps: parseInt(document.getElementById('stepsSlider').value),
                        guidance_scale: parseFloat(document.getElementById('guidanceSlider').value)
                    })
                });

                const data = await response.json();
                if (data.success) {
                    state.currentImageUrl = data.imageUrl;
                    document.getElementById('canvasDisplay').innerHTML = `<img src="${data.imageUrl}" alt="Generated">`;
                    document.getElementById('extraActions').style.display = 'flex';
                    playSound('success');
                    showStatus('¡Imagen generada!', 'success');
                } else {
                    throw new Error(data.error);
                }
            } catch (error) {
                showStatus('Error: ' + error.message, 'error');
            } finally {
                state.isGenerating = false;
                btn.classList.remove('loading');
                btn.textContent = '⚡ Generar';
            }
        }

        async function upscaleImage() {
            if (!state.currentImageUrl) {
                showStatus('Genera una imagen primero', 'error');
                return;
            }
            playSound('click');
            showStatus('Upscaling 4x...', 'info');
            
            try {
                const response = await fetch('/upscale', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ imageUrl: state.currentImageUrl })
                });

                const data = await response.json();
                if (data.success) {
                    state.currentImageUrl = data.upscaledUrl;
                    document.getElementById('canvasDisplay').innerHTML = `<img src="${data.upscaledUrl}" alt="Upscaled">`;
                    playSound('success');
                    showStatus('✅ Upscalado 4x', 'success');
                }
            } catch (error) {
                showStatus('Error upscale: ' + error.message, 'error');
            }
        }

        async function generateBatch() {
            if (!state.currentImageUrl) {
                showStatus('Genera una imagen primero', 'error');
                return;
            }
            
            playSound('generate');
            showStatus('Generando 4 variantes...', 'info');

            try {
                const promptText = document.getElementById('promptInput').value;
                state.batchImages = [];

                for (let i = 0; i < 4; i++) {
                    const response = await fetch('/generate', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            prompt: promptText,
                            style: state.selectedStyle,
                            camera: state.selectedCamera,
                            num_inference_steps: 30,
                            guidance_scale: 12.5
                        })
                    });

                    const data = await response.json();
                    if (data.success) {
                        state.batchImages.push(data.imageUrl);
                    }
                }

                const gallery = document.getElementById('gallery');
                gallery.innerHTML = state.batchImages.map(img => `
                    <div class="gallery-item">
                        <img src="${img}" alt="Variante">
                    </div>
                `).join('');
                gallery.style.display = 'grid';

                playSound('success');
                showStatus(`✅ 4 variantes listas`, 'success');
            } catch (error) {
                showStatus('Error batch: ' + error.message, 'error');
            }
        }

        function exportSocial() {
            if (!state.currentImageUrl) {
                showStatus('Genera una imagen primero', 'error');
                return;
            }
            showStatus('Social export: Instagram, TikTok, LinkedIn, X (descarga PNG)', 'info');
            downloadImage();
        }

        function downloadImage() {
            if (!state.currentImageUrl) {
                showStatus('No hay imagen', 'error');
                return;
            }
            const link = document.createElement('a');
            link.href = state.currentImageUrl;
            link.download = `merlin-${Date.now()}.png`;
            link.click();
            playSound('success');
            showStatus('¡Descargada!', 'success');
        }

        function clearCanvas() {
            document.getElementById('canvasDisplay').innerHTML = '<div class="canvas-placeholder">✨</div>';
            document.getElementById('gallery').innerHTML = '';
            document.getElementById('gallery').style.display = 'none';
            document.getElementById('extraActions').style.display = 'none';
            state.currentImageUrl = null;
        }

        function showStatus(text, type) {
            const msg = document.getElementById('statusMsg');
            msg.textContent = text;
            msg.className = `status-message show ${type}`;
            if (type !== 'error') setTimeout(() => msg.classList.remove('show'), 3000);
        }

        document.addEventListener('DOMContentLoaded', () => {
            console.log('✅ Merlin AI - LIMPITO Y SIN BUGS');
            loadMarketplace();
        });
    </script>
</body>
</html>
