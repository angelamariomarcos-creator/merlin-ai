<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merlin AI - Generador de Imágenes con IA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #0a0a0a;
            color: #e8e8e8;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            overflow-x: hidden;
            line-height: 1.6;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @keyframes slideIn {
            from { transform: translateX(-100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .studio-container {
            display: grid;
            grid-template-columns: 300px 1fr 350px;
            gap: 0;
            height: 100vh;
        }

        .sidebar-left {
            background: linear-gradient(180deg, #1a1a2e 0%, #0f0f23 100%);
            border-right: 1px solid rgba(139, 92, 246, 0.2);
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            animation: slideIn 0.5s ease;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(139, 92, 246, 0.2);
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #06b6d4 0%, #8b5cf6 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.3);
        }

        .logo-text h1 {
            font-size: 18px;
            font-weight: 700;
            color: #06b6d4;
            letter-spacing: 1px;
        }

        .logo-text p {
            font-size: 10px;
            color: #666;
            text-transform: uppercase;
        }

        .prompt-box {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .prompt-label {
            font-size: 11px;
            font-weight: 700;
            color: #06b6d4;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .prompt-textarea {
            background: rgba(255, 255, 255, 0.04);
            border: 1.5px solid rgba(139, 92, 246, 0.25);
            border-radius: 10px;
            padding: 14px;
            color: #e8e8e8;
            font-size: 13px;
            min-height: 140px;
            resize: vertical;
            font-family: inherit;
            transition: all 0.3s;
        }

        .prompt-textarea:focus {
            outline: none;
            border-color: #06b6d4;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.15);
        }

        .tabs-container {
            display: flex;
            gap: 8px;
            border-bottom: 1px solid rgba(139, 92, 246, 0.2);
            padding-bottom: 12px;
        }

        .tab-btn {
            flex: 1;
            padding: 8px 12px;
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid transparent;
            transition: all 0.3s;
        }

        .tab-btn.active {
            color: #06b6d4;
            border-bottom-color: #06b6d4;
        }

        .controls-panel {
            display: none;
            flex-direction: column;
            gap: 16px;
        }

        .controls-panel.active {
            display: flex;
            animation: fadeIn 0.3s;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .control-label {
            font-size: 10px;
            font-weight: 700;
            color: #999;
            text-transform: uppercase;
        }

        .control-value {
            font-size: 12px;
            color: #06b6d4;
            font-weight: 700;
        }

        .button-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .option-btn {
            padding: 10px 12px;
            background: rgba(139, 92, 246, 0.08);
            border: 1px solid rgba(139, 92, 246, 0.25);
            border-radius: 8px;
            color: #999;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .option-btn:hover {
            border-color: #06b6d4;
            color: #06b6d4;
            background: rgba(6, 182, 212, 0.08);
        }

        .option-btn.active {
            background: linear-gradient(135deg, #06b6d4 0%, #8b5cf6 100%);
            color: white;
            border-color: transparent;
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.3);
        }

        .slider-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .slider {
            width: 100%;
            height: 5px;
            border-radius: 3px;
            background: rgba(139, 92, 246, 0.15);
            outline: none;
            -webkit-appearance: none;
            cursor: pointer;
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #06b6d4;
            cursor: pointer;
            box-shadow: 0 0 12px rgba(6, 182, 212, 0.4);
        }

        .input-field {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(139, 92, 246, 0.25);
            border-radius: 8px;
            padding: 10px;
            color: #e8e8e8;
            font-size: 12px;
        }

        .input-field:focus {
            outline: none;
            border-color: #06b6d4;
        }

        .generate-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #06b6d4 0%, #8b5cf6 100%);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 700;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.2);
            margin-top: 8px;
        }

        .generate-btn:hover:not(.loading) {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(6, 182, 212, 0.4);
        }

        .generate-btn.loading {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .status-message {
            padding: 12px;
            border-radius: 8px;
            font-size: 12px;
            margin-top: 8px;
            display: none;
            animation: fadeIn 0.3s;
        }

        .status-message.show {
            display: block;
        }

        .status-message.success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #10b981;
        }

        .status-message.error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
        }

        .status-message.info {
            background: rgba(6, 182, 212, 0.1);
            border: 1px solid rgba(6, 182, 212, 0.3);
            color: #06b6d4;
        }

        .canvas-center {
            display: flex;
            flex-direction: column;
            background: #0a0a0a;
            border-left: 1px solid rgba(139, 92, 246, 0.2);
            border-right: 1px solid rgba(139, 92, 246, 0.2);
            overflow: hidden;
        }

        .toolbar {
            background: rgba(26, 26, 46, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(139, 92, 246, 0.2);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .toolbar-left {
            display: flex;
            gap: 12px;
        }

        .toolbar-btn {
            padding: 8px 14px;
            background: rgba(139, 92, 246, 0.08);
            border: 1px solid rgba(139, 92, 246, 0.25);
            border-radius: 8px;
            color: #999;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .toolbar-btn:hover {
            border-color: #06b6d4;
            color: #06b6d4;
            background: rgba(6, 182, 212, 0.08);
        }

        .canvas-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            overflow: auto;
            background: linear-gradient(135deg, rgba(15, 15, 35, 0.5) 0%, rgba(10, 10, 26, 0.5) 100%);
        }

        .canvas-display {
            width: 100%;
            max-width: 700px;
            aspect-ratio: 4/3;
            background: rgba(139, 92, 246, 0.05);
            border: 2px dashed rgba(6, 182, 212, 0.3);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            cursor: crosshair;
        }

        .canvas-display img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .canvas-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            color: #555;
            text-align: center;
            padding: 40px;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(6, 182, 212, 0.2);
            border-top-color: #06b6d4;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .inpainting-tools {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .inpaint-btn {
            padding: 8px 12px;
            background: rgba(139, 92, 246, 0.1);
            border: 1px solid rgba(139, 92, 246, 0.25);
            border-radius: 6px;
            color: #999;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .inpaint-btn:hover {
            border-color: #06b6d4;
            color: #06b6d4;
        }

        .inpaint-btn.active {
            background: #06b6d4;
            color: black;
            border-color: #06b6d4;
        }

        .sidebar-right {
            background: linear-gradient(180deg, #1a1a2e 0%, #0f0f23 100%);
            border-left: 1px solid rgba(139, 92, 246, 0.2);
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .sidebar-header {
            font-size: 11px;
            font-weight: 700;
            color: #06b6d4;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(139, 92, 246, 0.2);
        }

        .prompts-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 500px;
            overflow-y: auto;
        }

        .prompt-item {
            background: rgba(139, 92, 246, 0.08);
            border: 1px solid rgba(139, 92, 246, 0.2);
            border-radius: 8px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 12px;
        }

        .prompt-item:hover {
            border-color: #06b6d4;
            background: rgba(6, 182, 212, 0.08);
        }

        .prompt-item-title {
            font-weight: 600;
            color: #06b6d4;
            margin-bottom: 4px;
        }

        .prompt-item-text {
            color: #999;
            font-size: 11px;
            line-height: 1.3;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.3);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(6, 182, 212, 0.3);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(6, 182, 212, 0.5);
        }

        @media (max-width: 1200px) {
            .studio-container {
                grid-template-columns: 250px 1fr;
            }
            .sidebar-right {
                display: none;
            }
        }

        @media (max-width: 768px) {
            .studio-container {
                grid-template-columns: 1fr;
            }
            .sidebar-left {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="studio-container">
        
        <!-- SIDEBAR IZQUIERDA -->
        <div class="sidebar-left">
            <div class="logo-section">
                <div class="logo-icon">✨</div>
                <div class="logo-text">
                    <h1>MERLIN AI</h1>
                    <p>Generador de imagenes</p>
                </div>
            </div>

            <div class="prompt-box">
                <label class="prompt-label">Tu idea (Prompt)</label>
                <textarea 
                    id="promptInput" 
                    class="prompt-textarea" 
                    placeholder="Describe EXACTAMENTE lo que quieres: ropa, colores, detalles, escena, estilo, ambiente...">
                </textarea>
            </div>

            <div class="tabs-container">
                <button class="tab-btn active" onclick="switchTab('camera')">Camara</button>
                <button class="tab-btn" onclick="switchTab('style')">Estilo</button>
                <button class="tab-btn" onclick="switchTab('advanced')">Avanzado</button>
            </div>

            <!-- TAB: CAMARA -->
            <div id="camera" class="controls-panel active">
                <div class="control-group">
                    <label class="control-label">Angulo de Camara</label>
                    <div class="button-grid">
                        <button class="option-btn active" onclick="selectCamera('Frontal')">Frontal</button>
                        <button class="option-btn" onclick="selectCamera('Perfil')">Perfil</button>
                        <button class="option-btn" onclick="selectCamera('3/4')">3/4</button>
                        <button class="option-btn" onclick="selectCamera('Aereo')">Aereo</button>
                    </div>
                </div>
            </div>

            <!-- TAB: ESTILO -->
            <div id="style" class="controls-panel">
                <div class="control-group">
                    <label class="control-label">Estilo Artistico</label>
                    <div class="button-grid">
                        <button class="option-btn" onclick="selectStyle('Pixar')">Pixar</button>
                        <button class="option-btn" onclick="selectStyle('Comic')">Comic</button>
                        <button class="option-btn" onclick="selectStyle('Foto')">Foto Real</button>
                        <button class="option-btn" onclick="selectStyle('Acuarela')">Acuarela</button>
                        <button class="option-btn" onclick="selectStyle('Cyberpunk')">Cyberpunk</button>
                        <button class="option-btn" onclick="selectStyle('Dark')">Dark</button>
                    </div>
                </div>
            </div>

            <!-- TAB: AVANZADO -->
            <div id="advanced" class="controls-panel">
                <div class="control-group">
                    <label class="control-label">Pasos de Inferencia</label>
                    <div class="control-value"><span id="stepsVal">30</span> pasos</div>
                    <div class="slider-container">
                        <input 
                            type="range" 
                            min="20" 
                            max="50" 
                            value="30" 
                            class="slider"
                            id="stepsSlider"
                            oninput="document.getElementById('stepsVal').textContent = this.value"
                        >
                    </div>
                </div>

                <div class="control-group">
                    <label class="control-label">Guidance Scale (Precision)</label>
                    <div class="control-value"><span id="guidanceVal">7.5</span></div>
                    <div class="slider-container">
                        <input 
                            type="range" 
                            min="5" 
                            max="15" 
                            step="0.5"
                            value="7.5" 
                            class="slider"
                            id="guidanceSlider"
                            oninput="document.getElementById('guidanceVal').textContent = this.value"
                        >
                    </div>
                </div>

                <div class="control-group">
                    <label class="control-label">Mi LoRA (Personaje/Estilo)</label>
                    <select id="loraSelect" class="input-field">
                        <option value="">Ninguno</option>
                        <option value="javi_avatar">Mi Avatar (Javi)</option>
                        <option value="custom_style">Estilo Personal</option>
                    </select>
                </div>
            </div>

            <button class="generate-btn" id="generateBtn" onclick="generateImage()">
                Generar Imagen
            </button>

            <div id="statusMsg" class="status-message"></div>
        </div>

        <!-- CANVAS CENTRAL -->
        <div class="canvas-center">
            <div class="toolbar">
                <div class="toolbar-left">
                    <button class="toolbar-btn" onclick="togglePrompts()">Prompts</button>
                    <button class="toolbar-btn" onclick="toggleInpaint()">Inpainting</button>
                </div>
                <div>
                    <button class="toolbar-btn" onclick="downloadImage()">Descargar</button>
                    <button class="toolbar-btn" onclick="clearCanvas()">Limpiar</button>
                </div>
            </div>

            <div class="canvas-area">
                <div class="canvas-display" id="canvasDisplay">
                    <div class="canvas-placeholder">
                        <div style="font-size: 48px;">Espera</div>
                        <div>Escribe tu idea y haz clic en GENERAR</div>
                    </div>
                </div>

                <!-- INPAINTING TOOLS (OCULTO) -->
                <div id="inpaintTools" style="display: none; margin-top: 16px;">
                    <div class="inpainting-tools">
                        <button class="inpaint-btn active" onclick="setInpaintMode('draw')">Pintar Area</button>
                        <button class="inpaint-btn" onclick="setInpaintMode('clear')">Limpiar</button>
                        <button class="inpaint-btn" onclick="submitInpaint()">Aplicar Inpainting</button>
                    </div>
                    <textarea 
                        id="inpaintPrompt" 
                        class="prompt-textarea" 
                        style="margin-top: 12px; min-height: 80px;"
                        placeholder="Que quieres cambiar en esta area?"
                    ></textarea>
                </div>
            </div>
        </div>

        <!-- SIDEBAR DERECHA -->
        <div class="sidebar-right">
            <div class="sidebar-header">Prompts Sugeridos</div>
            <div class="prompts-list" id="promptsList">
                <div style="color: #666; font-size: 12px;">Cargando prompts...</div>
            </div>
        </div>
    </div>

    <script>
        // STATE
        const state = {
            selectedCamera: 'Frontal',
            selectedStyle: 'Ninguno',
            selectedLora: '',
            currentImageUrl: null,
            isGenerating: false,
            inpaintMode: false,
            inpaintArea: null
        };

        // SWITCH TABS
        function switchTab(tabName) {
            document.querySelectorAll('.controls-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }

        // SELECT CAMERA
        function selectCamera(camera) {
            state.selectedCamera = camera;
            document.querySelectorAll('#camera .option-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
        }

        // SELECT STYLE
        function selectStyle(style) {
            state.selectedStyle = style;
            document.querySelectorAll('#style .option-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
        }

        // GENERAR IMAGEN
        async function generateImage() {
            const prompt = document.getElementById('promptInput').value.trim();
            const btn = document.getElementById('generateBtn');
            const canvas = document.getElementById('canvasDisplay');
            const steps = document.getElementById('stepsSlider').value;
            const guidance = document.getElementById('guidanceSlider').value;
            const lora = document.getElementById('loraSelect').value;

            if (!prompt) {
                showStatus('Escribe un prompt detallado', 'error');
                return;
            }

            if (state.isGenerating) return;

            state.isGenerating = true;
            btn.classList.add('loading');
            btn.textContent = 'Generando...';
            canvas.innerHTML = '<div class="spinner"></div>';

            try {
                showStatus('Generando imagen...', 'info');

                const response = await fetch('/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        prompt: prompt,
                        style: state.selectedStyle,
                        camera: state.selectedCamera,
                        num_inference_steps: parseInt(steps),
                        guidance_scale: parseFloat(guidance),
                        lora_model: lora
                    })
                });

                const data = await response.json();

                if (data.success) {
                    state.currentImageUrl = data.imageUrl;
                    canvas.innerHTML = '<img src="' + data.imageUrl + '" alt="Generada">';
                    showStatus('Imagen generada exitosamente!', 'success');
                } else {
                    throw new Error(data.error || 'Error al generar');
                }
            } catch (error) {
                canvas.innerHTML = '<div class="canvas-placeholder"><div style="color: #ef4444;">Error: ' + error.message + '</div></div>';
                showStatus('Error: ' + error.message, 'error');
            } finally {
                state.isGenerating = false;
                btn.classList.remove('loading');
                btn.textContent = 'Generar Imagen';
            }
        }

        // TOGGLE PROMPTS
        function togglePrompts() {
            const list = document.getElementById('promptsList');
            if (list.style.display === 'none') {
                loadPrompts();
                list.style.display = 'flex';
            } else {
                list.style.display = 'none';
            }
        }

        // LOAD PROMPTS
        async function loadPrompts() {
            try {
                const response = await fetch('/marketplace/prompts');
                const data = await response.json();

                if (data.success && data.prompts.length > 0) {
                    const html = data.prompts.map(p => `
                        <div class="prompt-item" onclick="usePrompt('${p.prompt.replace(/'/g, "\\'")}')">
                            <div class="prompt-item-title">${p.title}</div>
                            <div class="prompt-item-text">${p.prompt.substring(0, 60)}...</div>
                        </div>
                    `).join('');
                    document.getElementById('promptsList').innerHTML = html;
                }
            } catch (error) {
                console.error('Error cargando prompts:', error);
            }
        }

        // USE PROMPT
        function usePrompt(prompt) {
            document.getElementById('promptInput').value = prompt;
            generateImage();
        }

        // TOGGLE INPAINT
        function toggleInpaint() {
            const tools = document.getElementById('inpaintTools');
            state.inpaintMode = !state.inpaintMode;
            tools.style.display = state.inpaintMode ? 'block' : 'none';
        }

        // SET INPAINT MODE
        function setInpaintMode(mode) {
            if (mode === 'clear') {
                document.getElementById('inpaintPrompt').value = '';
            }
            document.querySelectorAll('.inpaint-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
        }

        // SUBMIT INPAINT
        async function submitInpaint() {
            if (!state.currentImageUrl) {
                showStatus('Primero genera una imagen', 'error');
                return;
            }

            const inpaintPrompt = document.getElementById('inpaintPrompt').value.trim();
            if (!inpaintPrompt) {
                showStatus('Describe que quieres cambiar', 'error');
                return;
            }

            showStatus('Aplicando inpainting...', 'info');

            try {
                const response = await fetch('/inpaint', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        imageUrl: state.currentImageUrl,
                        prompt: inpaintPrompt
                    })
                });

                const data = await response.json();

                if (data.success) {
                    state.currentImageUrl = data.imageUrl;
                    document.getElementById('canvasDisplay').innerHTML = '<img src="' + data.imageUrl + '" alt="Inpainted">';
                    showStatus('Inpainting aplicado!', 'success');
                } else {
                    throw new Error(data.error);
                }
            } catch (error) {
                showStatus('Error en inpainting: ' + error.message, 'error');
            }
        }

        // DOWNLOAD IMAGE
        function downloadImage() {
            if (!state.currentImageUrl) {
                showStatus('No hay imagen para descargar', 'error');
                return;
            }

            const link = document.createElement('a');
            link.href = state.currentImageUrl;
            link.download = 'merlin-ai-' + Date.now() + '.png';
            link.click();
            showStatus('Imagen descargada!', 'success');
        }

        // CLEAR CANVAS
        function clearCanvas() {
            document.getElementById('canvasDisplay').innerHTML = '<div class="canvas-placeholder"><div>Lienzo limpio</div></div>';
            state.currentImageUrl = null;
            showStatus('Canvas limpiado', 'info');
        }

        // SHOW STATUS
        function showStatus(text, type) {
            const msg = document.getElementById('statusMsg');
            msg.textContent = text;
            msg.className = 'status-message show ' + type;
            
            if (type !== 'error') {
                setTimeout(() => msg.classList.remove('show'), 5000);
            }
        }

        // INIT
        document.addEventListener('DOMContentLoaded', () => {
            console.log('Merlin AI Frontend - Listo');
            loadPrompts();
        });
    </script>
</body>
</html>
