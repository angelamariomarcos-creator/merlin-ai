<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merlin AI - Generador de Imágenes</title>
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #e8e8e8;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow-x: hidden;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideIn { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .studio-container {
            display: grid;
            grid-template-columns: 300px 1fr 350px;
            gap: 0;
            height: 100vh;
        }

        /* SIDEBARS */
        .sidebar-left {
            background: linear-gradient(180deg, #1a1a2e 0%, #0f0f23 100%);
            border-right: 1px solid rgba(139, 92, 246, 0.2);
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            animation: slideIn 0.5s ease;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(139, 92, 246, 0.2);
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #06b6d4 0%, #8b5cf6 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.3);
        }

        .logo-text h1 { font-size: 18px; font-weight: 700; color: #06b6d4; }
        .logo-text p { font-size: 10px; color: #666; }

        .sound-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(139, 92, 246, 0.2);
            border: 1px solid rgba(139, 92, 246, 0.3);
            color: #06b6d4;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            z-index: 50;
        }

        .sound-toggle:hover { border-color: #06b6d4; }

        .prompt-box { display: flex; flex-direction: column; gap: 10px; }
        .prompt-label { font-size: 11px; font-weight: 700; color: #06b6d4; }
        .prompt-textarea {
            background: rgba(255, 255, 255, 0.04);
            border: 1.5px solid rgba(139, 92, 246, 0.25);
            border-radius: 10px;
            padding: 14px;
            color: #e8e8e8;
            font-size: 13px;
            min-height: 100px;
            resize: vertical;
            font-family: inherit;
            transition: all 0.3s;
        }

        .prompt-textarea:focus {
            outline: none;
            border-color: #06b6d4;
            background: rgba(255, 255, 255, 0.08);
        }

        .quick-actions {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .quick-btn {
            flex: 1;
            padding: 8px;
            background: rgba(139, 92, 246, 0.1);
            border: 1px solid rgba(139, 92, 246, 0.25);
            color: #06b6d4;
            border-radius: 6px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .quick-btn:hover {
            background: rgba(139, 92, 246, 0.2);
            border-color: #06b6d4;
        }

        .tabs-container { display: flex; gap: 8px; border-bottom: 1px solid rgba(139, 92, 246, 0.2); padding-bottom: 12px; }
        .tab-btn {
            padding: 8px 12px; background: none; border: none; color: #666; cursor: pointer;
            font-size: 11px; font-weight: 700; border-bottom: 2px solid transparent; transition: all 0.3s;
        }
        .tab-btn.active { color: #06b6d4; border-bottom-color: #06b6d4; }

        .controls-panel { display: none; flex-direction: column; gap: 16px; }
        .controls-panel.active { display: flex; animation: fadeIn 0.3s; }
        .control-group { display: flex; flex-direction: column; gap: 10px; }
        .control-label { font-size: 10px; font-weight: 700; color: #999; }
        .control-value { font-size: 12px; color: #06b6d4; font-weight: 700; }

        .button-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .option-btn {
            padding: 10px 12px; background: rgba(139, 92, 246, 0.08); border: 1px solid rgba(139, 92, 246, 0.25);
            border-radius: 8px; color: #999; font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.3s;
        }
        .option-btn:hover { border-color: #06b6d4; color: #06b6d4; }
        .option-btn.active { background: linear-gradient(135deg, #06b6d4, #8b5cf6); color: white; border-color: transparent; }

        .slider { width: 100%; height: 5px; border-radius: 3px; background: rgba(139, 92, 246, 0.15); outline: none; cursor: pointer; }
        .slider::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #06b6d4; }

        .generate-btn {
            width: 100%; padding: 16px; background: linear-gradient(135deg, #06b6d4, #8b5cf6); border: none;
            border-radius: 10px; color: white; font-weight: 700; font-size: 13px; cursor: pointer; transition: all 0.3s;
            margin-top: 8px;
        }

        .generate-btn:hover:not(.loading) { transform: translateY(-2px); }
        .generate-btn.loading { opacity: 0.7; cursor: not-allowed; }

        .status-message { padding: 12px; border-radius: 8px; font-size: 12px; margin-top: 8px; display: none; }
        .status-message.show { display: block; animation: fadeIn 0.3s; }
        .status-message.success { background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.3); color: #10b981; }
        .status-message.error { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); color: #ef4444; }
        .status-message.info { background: rgba(6, 182, 212, 0.1); border: 1px solid rgba(6, 182, 212, 0.3); color: #06b6d4; }

        /* CANVAS CENTER */
        .canvas-center { display: flex; flex-direction: column; background: #0a0a0a; border-left: 1px solid rgba(139, 92, 246, 0.2); border-right: 1px solid rgba(139, 92, 246, 0.2); overflow: hidden; }
        .toolbar { background: rgba(26, 26, 46, 0.8); border-bottom: 1px solid rgba(139, 92, 246, 0.2); padding: 16px 24px; display: flex; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .toolbar-left { display: flex; gap: 8px; flex-wrap: wrap; }
        .toolbar-btn { padding: 8px 12px; background: rgba(139, 92, 246, 0.08); border: 1px solid rgba(139, 92, 246, 0.25); border-radius: 8px; color: #999; font-size: 11px; cursor: pointer; transition: all 0.3s; }
        .toolbar-btn:hover { border-color: #06b6d4; color: #06b6d4; }

        .canvas-area { flex: 1; display: flex; align-items: center; justify-content: center; padding: 24px; overflow: auto; background: linear-gradient(135deg, rgba(15, 15, 35, 0.5), rgba(10, 10, 26, 0.5)); }
        .canvas-display { width: 100%; max-width: 700px; aspect-ratio: 4/3; background: rgba(139, 92, 246, 0.05); border: 2px dashed rgba(6, 182, 212, 0.3); border-radius: 16px; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; cursor: crosshair; }
        .canvas-display img { width: 100%; height: 100%; object-fit: cover; }
        .canvas-placeholder { display: flex; flex-direction: column; align-items: center; gap: 16px; color: #555; text-align: center; padding: 40px; }
        .spinner { width: 48px; height: 48px; border: 3px solid rgba(6, 182, 212, 0.2); border-top-color: #06b6d4; border-radius: 50%; animation: spin 1s linear infinite; }

        /* SIDEBAR RIGHT */
        .sidebar-right { background: linear-gradient(180deg, #1a1a2e, #0f0f23); border-left: 1px solid rgba(139, 92, 246, 0.2); overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 20px; }
        .sidebar-header { font-size: 11px; font-weight: 700; color: #06b6d4; padding-bottom: 12px; border-bottom: 1px solid rgba(139, 92, 246, 0.2); }

        .color-palette {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-top: 12px;
        }

        .color-swatch {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .color-swatch:hover {
            border-color: #06b6d4;
            transform: scale(1.05);
        }

        .prompts-list { display: flex; flex-direction: column; gap: 12px; }
        .prompt-item { background: rgba(139, 92, 246, 0.08); border: 1px solid rgba(139, 92, 246, 0.2); border-radius: 8px; padding: 12px; cursor: pointer; transition: all 0.3s; font-size: 11px; }
        .prompt-item:hover { border-color: #06b6d4; background: rgba(6, 182, 212, 0.08); }
        .prompt-item-title { font-weight: 600; color: #06b6d4; margin-bottom: 4px; }
        .prompt-item-text { color: #999; font-size: 10px; }
        .prompt-item-price { color: #10b981; font-weight: 700; font-size: 10px; margin-top: 4px; }

        .filter-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
        .filter-label { font-size: 10px; color: #06b6d4; font-weight: 700; }
        .filter-select { background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(139, 92, 246, 0.25); border-radius: 6px; padding: 8px; color: #e8e8e8; font-size: 11px; }

        .prompts-marketplace { display: flex; flex-direction: column; gap: 10px; max-height: 600px; overflow-y: auto; }
        .prompt-card { background: rgba(139, 92, 246, 0.08); border: 1px solid rgba(139, 92, 246, 0.2); border-radius: 8px; padding: 10px; font-size: 10px; transition: all 0.3s; }
        .prompt-card:hover { border-color: #06b6d4; background: rgba(6, 182, 212, 0.1); }
        .prompt-card-title { color: #06b6d4; font-weight: 700; margin-bottom: 4px; }
        .prompt-card-price { color: #10b981; font-weight: 700; }
        .prompt-card-category { color: #999; font-size: 9px; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.3); }
        ::-webkit-scrollbar-thumb { background: rgba(6, 182, 212, 0.3); border-radius: 4px; }

        @media (max-width: 1200px) {
            .studio-container { grid-template-columns: 250px 1fr; }
            .sidebar-right { display: none; }
        }

        @media (max-width: 768px) {
            .studio-container { grid-template-columns: 1fr; }
            .sidebar-left { display: none; }
        }
    </style>
</head>
<body>
    <button class="sound-toggle" id="soundToggle" onclick="toggleSound()">🔊</button>

    <div class="studio-container">
        
        <!-- SIDEBAR LEFT -->
        <div class="sidebar-left">
            <div class="logo-section">
                <div class="logo-icon">✨</div>
                <div class="logo-text">
                    <h1>MERLIN AI</h1>
                    <p>Generador de imágenes</p>
                </div>
            </div>

            <div class="quick-actions">
                <button class="quick-btn" onclick="panicCreative()" title="3 ideas aleatorias">🎲 Pánico</button>
                <button class="quick-btn" onclick="toggleInpaint()" title="Editar zona">✏️ Inpaint</button>
            </div>

            <div class="prompt-box">
                <label class="prompt-label">Tu idea (Prompt)</label>
                <textarea id="promptInput" class="prompt-textarea" placeholder="Escribe tu idea o usa un prompt del marketplace..."></textarea>
            </div>

            <div class="tabs-container">
                <button class="tab-btn active" onclick="switchTab('camera', event)">Cámara</button>
                <button class="tab-btn" onclick="switchTab('style', event)">Estilo</button>
                <button class="tab-btn" onclick="switchTab('advanced', event)">Avanzado</button>
            </div>

            <div id="camera" class="controls-panel active">
                <div class="control-group">
                    <label class="control-label">Tipo de Cámara</label>
                    <div class="button-grid">
                        <button class="option-btn active" onclick="selectCamera('Frontal', event)">Frontal</button>
                        <button class="option-btn" onclick="selectCamera('Perfil', event)">Perfil</button>
                        <button class="option-btn" onclick="selectCamera('3/4', event)">3/4</button>
                        <button class="option-btn" onclick="selectCamera('Aereo', event)">Aéreo</button>
                    </div>
                </div>
            </div>

            <div id="style" class="controls-panel">
                <div class="control-group">
                    <label class="control-label">Estilo Artístico</label>
                    <div class="button-grid">
                        <button class="option-btn" onclick="selectStyle('Pixar', event)">Pixar</button>
                        <button class="option-btn" onclick="selectStyle('Comic', event)">Comic</button>
                        <button class="option-btn" onclick="selectStyle('Foto', event)">Foto Real</button>
                        <button class="option-btn" onclick="selectStyle('Acuarela', event)">Acuarela</button>
                        <button class="option-btn" onclick="selectStyle('Cyberpunk', event)">Cyberpunk</button>
                        <button class="option-btn" onclick="selectStyle('Dark', event)">Dark</button>
                    </div>
                </div>
            </div>

            <div id="advanced" class="controls-panel">
                <div class="control-group">
                    <label class="control-label">Pasos</label>
                    <div class="control-value"><span id="stepsVal">30</span></div>
                    <input type="range" min="20" max="50" value="30" class="slider" id="stepsSlider" oninput="document.getElementById('stepsVal').textContent = this.value">
                </div>
                <div class="control-group">
                    <label class="control-label">Guidance</label>
                    <div class="control-value"><span id="guidanceVal">12.5</span></div>
                    <input type="range" min="5" max="20" step="0.5" value="12.5" class="slider" id="guidanceSlider" oninput="document.getElementById('guidanceVal').textContent = this.value">
                </div>
            </div>

            <button class="generate-btn" id="generateBtn" onclick="generateImage()">⚡ Generar</button>
            <div id="statusMsg" class="status-message"></div>
        </div>

        <!-- CANVAS CENTER -->
        <div class="canvas-center">
            <div class="toolbar">
                <div class="toolbar-left">
                    <button class="toolbar-btn" onclick="loadMarketplace()">Marketplace (100+)</button>
                    <button class="toolbar-btn" onclick="toggleHistory()">Historial</button>
                </div>
                <div>
                    <button class="toolbar-btn" onclick="downloadImage()">⬇️ Descargar</button>
                    <button class="toolbar-btn" onclick="clearCanvas()">🗑️ Limpiar</button>
                </div>
            </div>

            <div class="canvas-area">
                <div class="canvas-display" id="canvasDisplay">
                    <div class="canvas-placeholder">
                        <div style="font-size: 48px;">✨</div>
                        <div>Escribe tu idea y haz clic en GENERAR</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- SIDEBAR RIGHT -->
        <div class="sidebar-right">
            <div>
                <div class="sidebar-header">Marketplace - 100+ Prompts</div>
                
                <div class="filter-group">
                    <label class="filter-label">Categoría</label>
                    <select id="categoryFilter" class="filter-select" onchange="filterPrompts()">
                        <option value="">Todas</option>
                        <option value="Fantasy">Fantasy</option>
                        <option value="Sci-Fi">Sci-Fi</option>
                        <option value="Art">Art & Design</option>
                        <option value="Nature">Nature</option>
                        <option value="Character">Character Design</option>
                        <option value="Architecture">Architecture</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label class="filter-label">Tier</label>
                    <select id="tierFilter" class="filter-select" onchange="filterPrompts()">
                        <option value="">Todos</option>
                        <option value="standard">Standard ($0.99)</option>
                        <option value="premium">Premium ($1.49+)</option>
                    </select>
                </div>

                <div id="promptsMarketplace" class="prompts-marketplace">
                    <div style="text-align: center; color: #666; padding: 20px;">Cargando prompts...</div>
                </div>
            </div>

            <div>
                <div class="sidebar-header">Paleta de Colores</div>
                <div class="color-palette" id="colorPalette"></div>
            </div>
        </div>
    </div>

    <script>
        let audioContext = null;
        let isSoundEnabled = true;
        const creativeIdeas = [
            "Un astronauta buscando vida extraterrestre en un planeta alienígena, atmósfera púrpura, cinematic",
            "Un dragón hecho de cristal brillando bajo luz dorada, bosque encantado detrás",
            "Un viajero en el tiempo saltando entre épocas diferentes, cada una con su propia atmósfera",
            "Una ciudad submarina futurista con bioluminiscencia, criaturas marinas inteligentes",
            "Un mago antiguo descifrando antiguos símbolos mágicos, luces arcanas flotando",
            "Un robot artista pintando un lienzo blanco, paleta de colores flotando",
            "Una biblioteca interdimensional con libros que emiten luz propia, geometría imposible",
            "Un explorador descubriendo una ruina maya en la selva, luz dorada filtrándose",
            "Una persona surfeando en nubes de colores en el cielo, estilo surrealista",
            "Un laboratorio alquímico antiguo con pociones brillantes, humo mágico"
        ];

        const state = {
            selectedCamera: 'Frontal',
            selectedStyle: 'Ninguno',
            currentImageUrl: null,
            isGenerating: false,
            allPrompts: [],
            favorites: JSON.parse(localStorage.getItem('merlinFavorites')) || [],
            history: JSON.parse(localStorage.getItem('merlinHistory')) || []
        };

        function toggleSound() {
            isSoundEnabled = !isSoundEnabled;
            document.getElementById('soundToggle').textContent = isSoundEnabled ? '🔊' : '🔇';
        }

        function playSound(type = 'generate') {
            if (!isSoundEnabled) return;
            
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }

            const sounds = {
                generate: [440, 540, 640, 740],
                success: [523, 659, 784],
                click: [330]
            };

            const notes = sounds[type] || sounds.generate;
            let time = audioContext.currentTime;

            notes.forEach((freq, i) => {
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();
                osc.connect(gain);
                gain.connect(audioContext.destination);
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.2, time);
                gain.gain.exponentialRampToValueAtTime(0.01, time + 0.1);
                osc.start(time);
                osc.stop(time + 0.1);
                time += 0.12;
            });
        }

        function panicCreative() {
            playSound('click');
            const ideas = [];
            for (let i = 0; i < 3; i++) {
                ideas.push(creativeIdeas[Math.floor(Math.random() * creativeIdeas.length)]);
            }
            
            const prompt = ideas.join(' + ');
            document.getElementById('promptInput').value = prompt;
            showStatus('3 Ideas aleatorias generadas! 🎲', 'success');
        }

        function switchTab(tabName, evt) {
            document.querySelectorAll('.controls-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            if (evt?.currentTarget) evt.currentTarget.classList.add('active');
        }

        function selectCamera(camera, evt) {
            state.selectedCamera = camera;
            document.querySelectorAll('#camera .option-btn').forEach(b => b.classList.remove('active'));
            if (evt?.currentTarget) evt.currentTarget.classList.add('active');
            playSound('click');
        }

        function selectStyle(style, evt) {
            state.selectedStyle = style;
            document.querySelectorAll('#style .option-btn').forEach(b => b.classList.remove('active'));
            if (evt?.currentTarget) evt.currentTarget.classList.add('active');
            playSound('click');
        }

        function toggleInpaint() {
            showStatus('Inpainting: Primero genera una imagen', 'info');
        }

        // CARGAR MARKETPLACE AUTOMÁTICO AL ABRIR
        async function loadMarketplace() {
            playSound('click');
            showStatus('Cargando marketplace...', 'info');
            
            try {
                const response = await fetch('/marketplace/prompts');
                const data = await response.json();
                
                if (data.success) {
                    state.allPrompts = data.prompts;
                    renderPrompts(data.prompts);
                    showStatus(`✅ Marketplace: ${data.total} prompts disponibles`, 'success');
                } else {
                    throw new Error(data.error);
                }
            } catch (error) {
                showStatus('Error cargando marketplace: ' + error.message, 'error');
            }
        }

        // RENDERIZAR PROMPTS
        function renderPrompts(prompts) {
            const container = document.getElementById('promptsMarketplace');
            
            if (prompts.length === 0) {
                container.innerHTML = '<div style="color: #666; padding: 20px; text-align: center;">No hay prompts que coincidan</div>';
                return;
            }

            container.innerHTML = prompts.map(p => `
                <div class="prompt-card">
                    <div class="prompt-card-title">${p.title}</div>
                    <div class="prompt-card-category">${p.category}</div>
                    <div class="prompt-card-price">$${p.price.toFixed(2)}</div>
                    <div style="margin-top: 8px; font-size: 9px; color: #999;">"${p.prompt.substring(0, 50)}..."</div>
                    <div style="margin-top: 8px; display: flex; gap: 4px;">
                        <button style="flex: 1; padding: 4px; background: rgba(139, 92, 246, 0.2); border: 1px solid rgba(139, 92, 246, 0.3); border-radius: 4px; color: #06b6d4; font-size: 9px; cursor: pointer;" onclick="usePrompt('${p.id}', \`${p.prompt.replace(/`/g, '\\`')}\`)">Usar</button>
                    </div>
                </div>
            `).join('');
        }

        // USAR PROMPT
        function usePrompt(promptId, promptText) {
            document.getElementById('promptInput').value = promptText;
            showStatus('✅ Prompt cargado! Haz clic en GENERAR', 'success');
            playSound('success');
        }

        // FILTRAR
        function filterPrompts() {
            const category = document.getElementById('categoryFilter').value;
            const tier = document.getElementById('tierFilter').value;

            let filtered = state.allPrompts;

            if (category) filtered = filtered.filter(p => p.category === category);
            if (tier) filtered = filtered.filter(p => p.tier === tier);

            renderPrompts(filtered);
        }

        // GENERAR IMAGEN
        async function generateImage() {
            const promptText = document.getElementById('promptInput').value.trim();
            if (!promptText) {
                showStatus('Escribe un prompt', 'error');
                return;
            }

            if (state.isGenerating) return;

            state.isGenerating = true;
            const btn = document.getElementById('generateBtn');
            btn.classList.add('loading');
            btn.textContent = 'Generando...';

            playSound('generate');

            try {
                const response = await fetch('/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        prompt: promptText,
                        style: state.selectedStyle,
                        camera: state.selectedCamera,
                        num_inference_steps: parseInt(document.getElementById('stepsSlider').value),
                        guidance_scale: parseFloat(document.getElementById('guidanceSlider').value)
                    })
                });

                const data = await response.json();

                if (data.success) {
                    state.currentImageUrl = data.imageUrl;
                    document.getElementById('canvasDisplay').innerHTML = `<img src="${data.imageUrl}" alt="Generated">`;
                    playSound('success');
                    showStatus('¡Imagen generada!', 'success');

                    // Guardar historial
                    state.history.unshift({
                        prompt: promptText,
                        imageUrl: data.imageUrl,
                        timestamp: new Date().toLocaleTimeString('es-ES')
                    });
                    localStorage.setItem('merlinHistory', JSON.stringify(state.history.slice(0, 20)));
                } else {
                    throw new Error(data.error);
                }
            } catch (error) {
                showStatus('Error: ' + error.message, 'error');
            } finally {
                state.isGenerating = false;
                btn.classList.remove('loading');
                btn.textContent = '⚡ Generar';
            }
        }

        function toggleHistory() {
            if (state.history.length === 0) {
                showStatus('No hay historial aún. Genera algunas imágenes primero.', 'info');
                return;
            }
            showStatus(`📊 Historial: ${state.history.length} generaciones`, 'info');
        }

        function downloadImage() {
            if (!state.currentImageUrl) {
                showStatus('No hay imagen para descargar', 'error');
                return;
            }

            const link = document.createElement('a');
            link.href = state.currentImageUrl;
            link.download = `merlin-${Date.now()}.png`;
            link.click();

            playSound('success');
            showStatus('¡Descargada!', 'success');
        }

        function clearCanvas() {
            document.getElementById('canvasDisplay').innerHTML = '<div class="canvas-placeholder"><div style="font-size: 48px;">✨</div><div>Canvas limpio</div></div>';
            state.currentImageUrl = null;
            showStatus('Canvas limpiado', 'info');
        }

        function showStatus(text, type) {
            const msg = document.getElementById('statusMsg');
            msg.textContent = text;
            msg.className = `status-message show ${type}`;
            if (type !== 'error') {
                setTimeout(() => msg.classList.remove('show'), 4000);
            }
        }

        // INIT - CARGAR MARKETPLACE AL ABRIR LA PÁGINA
        document.addEventListener('DOMContentLoaded', () => {
            console.log('✅ Merlin AI Iniciado');
            loadMarketplace(); // AUTO-CARGA LOS PROMPTS
        });
    </script>
</body>
</html>
