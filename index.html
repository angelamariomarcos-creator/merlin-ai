<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merlin AI - Generador de Imágenes</title>
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        /* Estilos integrados del Generador de Imágenes */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #e8e8e8;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow-x: hidden;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideIn { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .studio-container {
            display: grid;
            grid-template-columns: 300px 1fr 350px;
            gap: 0;
            height: 100vh;
        }
        .sidebar-left {
            background: linear-gradient(180deg, #1a1a2e 0%, #0f0f23 100%);
            border-right: 1px solid rgba(139, 92, 246, 0.2);
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            animation: slideIn 0.5s ease;
        }
        .logo-section {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(139, 92, 246, 0.2);
        }
        .logo-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #06b6d4 0%, #8b5cf6 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.3);
        }
        .logo-text h1 { font-size: 18px; font-weight: 700; color: #06b6d4; letter-spacing: 1px; }
        .logo-text p { font-size: 10px; color: #666; text-transform: uppercase; }
        .back-to-landing { font-size: 12px; margin-top: -10px; }
        .back-to-landing a { color: #06b6d4; text-decoration: none; cursor: pointer; }
        .back-to-landing a:hover { text-decoration: underline; }

        .prompt-box { display: flex; flex-direction: column; gap: 10px; }
        .prompt-label { font-size: 11px; font-weight: 700; color: #06b6d4; text-transform: uppercase; }
        .prompt-textarea {
            background: rgba(255, 255, 255, 0.04);
            border: 1.5px solid rgba(139, 92, 246, 0.25);
            border-radius: 10px;
            padding: 14px;
            color: #e8e8e8;
            font-size: 13px;
            min-height: 140px;
            resize: vertical;
            font-family: inherit;
            transition: all 0.3s;
        }
        .prompt-textarea:focus {
            outline: none;
            border-color: #06b6d4;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.15);
        }

        .tabs-container { display: flex; gap: 8px; border-bottom: 1px solid rgba(139, 92, 246, 0.2); padding-bottom: 12px; }
        .tab-btn {
            padding: 8px 12px; background: none; border: none; color: #666; cursor: pointer;
            font-size: 11px; font-weight: 700; text-transform: uppercase; border-bottom: 2px solid transparent; transition: all 0.3s;
        }
        .tab-btn.active { color: #06b6d4; border-bottom-color: #06b6d4; }
        .controls-panel { display: none; flex-direction: column; gap: 16px; }
        .controls-panel.active { display: flex; animation: fadeIn 0.3s; }
        .control-group { display: flex; flex-direction: column; gap: 10px; }
        .control-label { font-size: 10px; font-weight: 700; color: #999; text-transform: uppercase; }
        .control-value { font-size: 12px; color: #06b6d4; font-weight: 700; }

        .button-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .option-btn {
            padding: 10px 12px; background: rgba(139, 92, 246, 0.08); border: 1px solid rgba(139, 92, 246, 0.25);
            border-radius: 8px; color: #999; font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.3s;
        }
        .option-btn:hover { border-color: #06b6d4; color: #06b6d4; background: rgba(6, 182, 212, 0.08); }
        .option-btn.active { background: linear-gradient(135deg, #06b6d4 0%, #8b5cf6 100%); color: white; border-color: transparent; box-shadow: 0 0 15px rgba(6, 182, 212, 0.3); }

        .slider-container { display: flex; flex-direction: column; gap: 8px; }
        .slider { width: 100%; height: 5px; border-radius: 3px; background: rgba(139, 92, 246, 0.15); outline: none; -webkit-appearance: none; cursor: pointer; }
        .slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #06b6d4; cursor: pointer; box-shadow: 0 0 12px rgba(6, 182, 212, 0.4); }
        .slider::-moz-range-thumb { width: 16px; height: 16px; border-radius: 50%; background: #06b6d4; cursor: pointer; border: none; }

        .generate-btn {
            width: 100%; padding: 16px; background: linear-gradient(135deg, #06b6d4 0%, #8b5cf6 100%); border: none;
            border-radius: 10px; color: white; font-weight: 700; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: all 0.3s; box-shadow: 0 0 20px rgba(6, 182, 212, 0.2); margin-top: 8px;
        }
        .generate-btn:hover:not(.loading) { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(6, 182, 212, 0.4); }
        .generate-btn.loading { opacity: 0.7; cursor: not-allowed; }
        
        .status-message { padding: 12px; border-radius: 8px; font-size: 12px; margin-top: 8px; display: none; animation: fadeIn 0.3s; }
        .status-message.show { display: block; }
        .status-message.success { background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.3); color: #10b981; }
        .status-message.error { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); color: #ef4444; }
        .status-message.info { background: rgba(6, 182, 212, 0.1); border: 1px solid rgba(6, 182, 212, 0.3); color: #06b6d4; }

        .canvas-center { display: flex; flex-direction: column; background: #0a0a0a; border-left: 1px solid rgba(139, 92, 246, 0.2); border-right: 1px solid rgba(139, 92, 246, 0.2); overflow: hidden; }
        .toolbar { background: rgba(26, 26, 46, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(139, 92, 246, 0.2); padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; gap: 12px; }
        .toolbar-left { display: flex; gap: 12px; }
        .toolbar-btn { padding: 8px 14px; background: rgba(139, 92, 246, 0.08); border: 1px solid rgba(139, 92, 246, 0.25); border-radius: 8px; color: #999; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .toolbar-btn:hover { border-color: #06b6d4; color: #06b6d4; background: rgba(6, 182, 212, 0.08); }

        .canvas-area { flex: 1; display: flex; align-items: center; justify-content: center; padding: 24px; overflow: auto; background: linear-gradient(135deg, rgba(15, 15, 35, 0.5) 0%, rgba(10, 10, 26, 0.5) 100%); }
        .canvas-display { width: 100%; max-width: 700px; aspect-ratio: 4/3; background: rgba(139, 92, 246, 0.05); border: 2px dashed rgba(6, 182, 212, 0.3); border-radius: 16px; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        .canvas-display img { width: 100%; height: 100%; object-fit: cover; animation: fadeIn 0.5s; }
        .canvas-placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; color: #555; text-align: center; padding: 40px; }
        .spinner { width: 48px; height: 48px; border: 3px solid rgba(6, 182, 212, 0.2); border-top-color: #06b6d4; border-radius: 50%; animation: spin 1s linear infinite; }

        .sidebar-right { background: linear-gradient(180deg, #1a1a2e 0%, #0f0f23 100%); border-left: 1px solid rgba(139, 92, 246, 0.2); overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 20px; }
        .sidebar-header { font-size: 11px; font-weight: 700; color: #06b6d4; text-transform: uppercase; padding-bottom: 12px; border-bottom: 1px solid rgba(139, 92, 246, 0.2); }
        .prompts-list { display: flex; flex-direction: column; gap: 12px; }
        .prompt-item { background: rgba(139, 92, 246, 0.08); border: 1px solid rgba(139, 92, 246, 0.2); border-radius: 8px; padding: 12px; cursor: pointer; transition: all 0.3s; font-size: 12px; }
        .prompt-item:hover { border-color: #06b6d4; background: rgba(6, 182, 212, 0.08); }
        .prompt-item-title { font-weight: 600; color: #06b6d4; margin-bottom: 4px; }
        .prompt-item-text { color: #999; font-size: 11px; line-height: 1.3; }
        .prompt-item-price { color: #10b981; font-size: 10px; margin-top: 4px; }
        .prompt-item-buy { background: linear-gradient(135deg, #06b6d4, #8b5cf6); color: white; border: none; padding: 4px 8px; border-radius: 4px; font-size: 10px; cursor: pointer; margin-top: 6px; width: 100%; }
        .prompt-item-buy:hover { opacity: 0.9; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.3); }
        ::-webkit-scrollbar-thumb { background: rgba(6, 182, 212, 0.3); border-radius: 4px; }

        .stripe-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .stripe-modal.show { display: flex; }
        .stripe-modal-content { background: #1a1a2e; border-radius: 16px; padding: 40px; max-width: 500px; width: 90%; }
        .stripe-modal-close { float: right; font-size: 28px; cursor: pointer; color: #999; }
        .stripe-modal-close:hover { color: #06b6d4; }
        .stripe-modal h2 { color: #06b6d4; margin-bottom: 20px; }
        .stripe-form-group { margin-bottom: 20px; }
        .stripe-label { display: block; font-size: 12px; color: #999; margin-bottom: 8px; }
        #card-element { padding: 12px; background: rgba(255,255,255,0.04); border: 1px solid rgba(139,92,246,0.25); border-radius: 8px; color: #e8e8e8; }
        .stripe-btn { width: 100%; padding: 12px; background: linear-gradient(135deg, #06b6d4, #8b5cf6); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; margin-top: 20px; }
        .stripe-btn:hover { opacity: 0.9; }

        @media (max-width: 1200px) { .studio-container { grid-template-columns: 250px 1fr; } .sidebar-right { display: none; } }
        @media (max-width: 768px) { .studio-container { grid-template-columns: 1fr; } .sidebar-left { display: none; } }
    </style>
</head>
<body>
    <div class="studio-container">
        <div class="sidebar-left">
            <div class="logo-section">
                <div class="logo-icon">✨</div>
                <div class="logo-text">
                    <h1>MERLIN AI</h1>
                    <p>Generador de imágenes</p>
                </div>
            </div>
            <div class="back-to-landing">
                <a onclick="goToLanding()">← Volver al inicio</a>
            </div>

            <div class="prompt-box">
                <label class="prompt-label">Tu idea (Prompt)</label>
                <textarea id="promptInput" class="prompt-textarea" placeholder="Escribe tu idea aquí..."></textarea>
            </div>

            <div class="tabs-container">
                <button class="tab-btn active" onclick="switchTab('camera', event)">Cámara</button>
                <button class="tab-btn" onclick="switchTab('style', event)">Estilo</button>
                <button class="tab-btn" onclick="switchTab('advanced', event)">Avanzado</button>
            </div>

            <div id="camera" class="controls-panel active">
                <div class="control-group">
                    <label class="control-label">Tipo de Cámara</label>
                    <div class="button-grid">
                        <button class="option-btn active" onclick="selectCamera('Frontal', event)">Frontal</button>
                        <button class="option-btn" onclick="selectCamera('Perfil', event)">Perfil</button>
                        <button class="option-btn" onclick="selectCamera('3/4', event)">3/4</button>
                        <button class="option-btn" onclick="selectCamera('Aereo', event)">Aéreo</button>
                    </div>
                </div>
            </div>

            <div id="style" class="controls-panel">
                <div class="control-group">
                    <label class="control-label">Estilo Artístico</label>
                    <div class="button-grid">
                        <button class="option-btn" onclick="selectStyle('Pixar', event)">Pixar</button>
                        <button class="option-btn" onclick="selectStyle('Comic', event)">Comic</button>
                        <button class="option-btn" onclick="selectStyle('Foto', event)">Foto Real</button>
                        <button class="option-btn" onclick="selectStyle('Acuarela', event)">Acuarela</button>
                        <button class="option-btn" onclick="selectStyle('Cyberpunk', event)">Cyberpunk</button>
                        <button class="option-btn" onclick="selectStyle('Dark', event)">Dark</button>
                    </div>
                </div>
            </div>

            <div id="advanced" class="controls-panel">
                <div class="control-group">
                    <label class="control-label">Pasos de Inferencia</label>
                    <div class="control-value"><span id="stepsVal">30</span> pasos</div>
                    <div class="slider-container">
                        <input type="range" min="20" max="50" value="30" class="slider" id="stepsSlider" oninput="document.getElementById('stepsVal').textContent = this.value">
                    </div>
                </div>
                <div class="control-group">
                    <label class="control-label">Guidance Scale</label>
                    <div class="control-value"><span id="guidanceVal">12.5</span></div>
                    <div class="slider-container">
                        <input type="range" min="5" max="20" step="0.5" value="12.5" class="slider" id="guidanceSlider" oninput="document.getElementById('guidanceVal').textContent = this.value">
                    </div>
                </div>
            </div>

            <button class="generate-btn" id="generateBtn" onclick="generateImage()">Generar Imagen</button>
            <div id="statusMsg" class="status-message"></div>
        </div>

        <div class="canvas-center">
            <div class="toolbar">
                <div class="toolbar-left">
                    <button class="toolbar-btn" onclick="loadPrompts()">Sincronizar Marketplace</button>
                </div>
                <div>
                    <button class="toolbar-btn" onclick="downloadImage()">Descargar</button>
                    <button class="toolbar-btn" onclick="clearCanvas()">Limpiar</button>
                </div>
            </div>
            <div class="canvas-area">
                <div class="canvas-display" id="canvasDisplay">
                    <div class="canvas-placeholder">
                        <div style="font-size: 48px;">✨</div>
                        <div>Escribe tu idea y haz clic en GENERAR</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="sidebar-right">
            <div class="sidebar-header">Catálogo Marketplace</div>
            <div class="prompts-list" id="promptsList">
                <div style="color: #666; font-size: 12px;">Haz clic en "Sincronizar Marketplace" para inicializar.</div>
            </div>
        </div>
    </div>

    <div id="stripeModal" class="stripe-modal">
        <div class="stripe-modal-content">
            <span class="stripe-modal-close" onclick="closeStripeModal()">&times;</span>
            <h2>Comprar Plantilla Premium</h2>
            <p id="stripePriceText" style="color: #06b6d4; margin-bottom: 20px;"></p>
            <div class="stripe-form-group">
                <label class="stripe-label">Tarjeta de Crédito</label>
                <div id="card-element"></div>
            </div>
            <button class="stripe-btn" onclick="processPayment()">Pagar ahora</button>
        </div>
    </div>

    <script>
        let stripe = null;
        let elements = null;
        let cardElement = null;
        let promptsCatalog = [];
        let isCatalogLoading = false;
        let pendingSelectionId = null;
        let currentPaymentPromptId = null;

        const state = {
            selectedCamera: 'Frontal',
            selectedStyle: 'Ninguno',
            currentImageUrl: null,
            isGenerating: false
        };

        function initStripe() {
            fetch('/config')
                .then(r => r.json())
                .then(config => {
                    stripe = Stripe(config.stripePublishableKey);
                    elements = stripe.elements();
                    cardElement = elements.create('card');
                    cardElement.mount('#card-element');
                })
                .catch(() => console.log('Stripe no disponible (desarrollo)'));
        }

        function switchTab(tabName, evt) {
            document.querySelectorAll('.controls-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            if (evt && evt.currentTarget) evt.currentTarget.classList.add('active');
        }

        function selectCamera(camera, evt) {
            state.selectedCamera = camera;
            document.querySelectorAll('#camera .option-btn').forEach(b => b.classList.remove('active'));
            if (evt && evt.currentTarget) evt.currentTarget.classList.add('active');
            showStatus('Cámara: ' + camera, 'info');
        }

        function selectStyle(style, evt) {
            state.selectedStyle = style;
            document.querySelectorAll('#style .option-btn').forEach(b => b.classList.remove('active'));
            if (evt && evt.currentTarget) evt.currentTarget.classList.add('active');
            showStatus('Estilo: ' + style, 'info');
        }

        async function loadPrompts() {
            if (isCatalogLoading) return;
            isCatalogLoading = true;
            showStatus('Sincronizando catálogo...', 'info');

            try {
                const response = await fetch('/marketplace/prompts');
                const result = await response.json();

                if (result.success && Array.isArray(result.prompts)) {
                    promptsCatalog = result.prompts;
                    isCatalogLoading = false;

                    const html = promptsCatalog.map(p => `
                        <div class="prompt-item">
                            <div class="prompt-item-title">${p.title}</div>
                            <div class="prompt-item-text">${p.prompt.substring(0, 55)}...</div>
                            <div class="prompt-item-price">$${p.price}</div>
                            <button class="prompt-item-buy" onclick="buyPrompt('${p.id}', ${p.price})">Comprar & Usar</button>
                        </div>
                    `).join('');
                    
                    document.getElementById('promptsList').innerHTML = html;
                    showStatus('Catálogo cargado correctamente', 'success');

                    if (pendingSelectionId) {
                        applyPromptById(pendingSelectionId);
                        pendingSelectionId = null;
                    }
                }
            } catch (error) {
                isCatalogLoading = false;
                showStatus('Error cargando catálogo', 'error');
            }
        }

        function applyPromptById(promptId) {
            if (isCatalogLoading) {
                pendingSelectionId = promptId;
                return;
            }
            const match = promptsCatalog.find(p => p.id === promptId);
            if (match && match.prompt) {
                document.getElementById('promptInput').value = match.prompt;
                showStatus('Plantilla cargada', 'success');
            }
        }

        function buyPrompt(promptId, price) {
            currentPaymentPromptId = promptId;
            document.getElementById('stripePriceText').textContent = 'Precio: $' + price.toFixed(2);
            document.getElementById('stripeModal').classList.add('show');
        }

        function closeStripeModal() {
            document.getElementById('stripeModal').classList.remove('show');
            currentPaymentPromptId = null;
        }

        async function processPayment() {
            if (!stripe || !cardElement) {
                showStatus('Sistema de pagos no disponible', 'error');
                return;
            }
            showStatus('Procesando pago...', 'info');
            try {
                const response = await fetch('/create-payment-intent', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ promptId: currentPaymentPromptId, amount: 50 })
                });
                const paymentData = await response.json();
                if (paymentData.clientSecret) {
                    const result = await stripe.confirmCardPayment(paymentData.clientSecret, {
                        payment_method: { card: cardElement, billing_details: { name: 'Usuario Merlin AI' } }
                    });
                    if (result.paymentIntent && result.paymentIntent.status === 'succeeded') {
                        showStatus('Pago exitoso! Plantilla desbloqueada', 'success');
                        applyPromptById(currentPaymentPromptId);
                        closeStripeModal();
                    } else {
                        showStatus('Pago rechazado', 'error');
                    }
                }
            } catch (error) {
                showStatus('Error en pago: ' + error.message, 'error');
            }
        }

        async function generateImage() {
            const promptText = document.getElementById('promptInput').value.trim();
            const btn = document.getElementById('generateBtn');
            const canvas = document.getElementById('canvasDisplay');
            const steps = document.getElementById('stepsSlider').value;
            const guidance = document.getElementById('guidanceSlider').value;

            if (!promptText) {
                showStatus('El prompt no puede estar vacío', 'error');
                return;
            }

            if (state.isGenerating) return;
            state.isGenerating = true;
            btn.classList.add('loading');
            btn.textContent = 'Procesando...';
            canvas.innerHTML = '<div class="spinner"></div>';

            try {
                const response = await fetch('/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        prompt: promptText,
                        style: state.selectedStyle,
                        camera: state.selectedCamera,
                        num_inference_steps: parseInt(steps),
                        guidance_scale: parseFloat(guidance)
                    })
                });
                const data = await response.json();
                if (data.success) {
                    state.currentImageUrl = data.imageUrl;
                    canvas.innerHTML = `<img src="${data.imageUrl}" alt="Resultado Merlin AI">`;
                    showStatus('Imagen generada exitosamente', 'success');
                } else {
                    throw new Error(data.error || 'Error desconocido');
                }
            } catch (error) {
                canvas.innerHTML = `<div class="canvas-placeholder"><div style="color: #ef4444;">Error: ${error.message}</div></div>`;
                showStatus('Error: ' + error.message, 'error');
            } finally {
                state.isGenerating = false;
                btn.classList.remove('loading');
                btn.textContent = 'Generar Imagen';
            }
        }

        function downloadImage() {
            if (!state.currentImageUrl) {
                showStatus('No hay imagen para descargar', 'error');
                return;
            }
            const link = document.createElement('a');
            link.href = state.currentImageUrl;
            link.download = `merlin-${Date.now()}.png`;
            link.click();
        }

        function clearCanvas() {
            document.getElementById('canvasDisplay').innerHTML = '<div class="canvas-placeholder"><div style="font-size: 48px;">✨</div><div>Lienzo limpio</div></div>';
            state.currentImageUrl = null;
            showStatus('Lienzo restablecido', 'info');
        }

        function showStatus(text, type) {
            const msg = document.getElementById('statusMsg');
            msg.textContent = text;
            msg.className = 'status-message show ' + type;
            if (type !== 'error') {
                setTimeout(() => msg.classList.remove('show'), 4000);
            }
        }

        function goToLanding() {
            window.location.href = '/';
        }

        document.addEventListener('DOMContentLoaded', () => {
            initStripe();
        });
    </script>
</body>
</html>
