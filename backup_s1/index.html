<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merlin AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Poppins', sans-serif; }
        h1, h2, button { font-family: 'Orbitron', sans-serif; }
        .magic-reveal { filter: blur(12px); opacity: 0; transition: all 0.8s ease; }
        .magic-reveal.revealed { filter: blur(0); opacity: 1; }
        .mood-btn.selected, .ratio-btn.selected, .camera-btn.selected { border-color: #06b6d4; background: rgba(6,182,212,0.2); }
    </style>
</head>
<body class="bg-black text-white">
<div class="mx-auto px-4 py-8">
    <h1 class="text-4xl font-bold text-center mb-2">✨ Merlin AI</h1>
    <p class="text-gray-400 text-center mb-8">Tu estilo de dibujo, generado por IA</p>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <div class="bg-gray-900 p-6 rounded-lg">
            <h2 class="text-xl font-bold mb-4">Describe tu idea</h2>
            
            <div class="relative mb-4">
                <textarea id="prompt" class="w-full h-24 bg-gray-800 text-white p-3 rounded" placeholder="Ej: Una chica ninja en un tejado bajo la lluvia..."></textarea>
                <button id="magicWand" class="absolute top-2 right-2 text-2xl">🪄</button>
            </div>

            <label class="text-sm text-gray-400 block mb-2">Formato</label>
            <div class="grid grid-cols-3 gap-2 mb-4">
                <button class="ratio-btn p-2 rounded border border-gray-700 text-xs selected" data-w="768" data-h="768">🔲 Cuadrado</button>
                <button class="ratio-btn p-2 rounded border border-gray-700 text-xs" data-w="576" data-h="1024">📱 Vertical</button>
                <button class="ratio-btn p-2 rounded border border-gray-700 text-xs" data-w="1024" data-h="576">🖥️ Horizontal</button>
            </div>

            <label class="text-sm text-gray-400 block mb-2">Cámara</label>
            <div class="grid grid-cols-4 gap-2 mb-4">
                <button class="camera-btn p-2 rounded border border-gray-700 text-xs" data-camera="fisheye">👁️ Pez</button>
                <button class="camera-btn p-2 rounded border border-gray-700 text-xs" data-camera="closeup">🎬 Close</button>
                <button class="camera-btn p-2 rounded border border-gray-700 text-xs" data-camera="aerial">📐 Aéreo</button>
                <button class="camera-btn p-2 rounded border border-gray-700 text-xs" data-camera="wideangle">📸 Wide</button>
            </div>

            <label class="text-sm text-gray-400 block mb-2">Mood</label>
            <div class="grid grid-cols-5 gap-2 mb-4">
                <button class="mood-btn p-2 rounded border border-gray-700 text-xs" data-mood="comic">🎨 Cómic</button>
                <button class="mood-btn p-2 rounded border border-gray-700 text-xs" data-mood="cyberpunk">🌐 Cyber</button>
                <button class="mood-btn p-2 rounded border border-gray-700 text-xs" data-mood="watercolor">🎭 Agua</button>
                <button class="mood-btn p-2 rounded border border-gray-700 text-xs" data-mood="dark">🌑 Dark</button>
                <button class="mood-btn p-2 rounded border border-gray-700 text-xs" data-mood="neon">⚡ Neon</button>
            </div>

            <button id="panicBtn" class="w-full bg-purple-600 hover:bg-purple-700 py-2 rounded mb-4 text-sm">🎲 Pánico</button>

            <label class="text-sm text-gray-400 block mb-2">Imagen/Boceto</label>
            <input type="file" id="imageUpload" accept="image/*" class="w-full bg-gray-800 p-2 rounded text-sm mb-4">

            <div class="grid grid-cols-2 gap-2">
                <button id="generateBtn" class="bg-cyan-500 text-black font-bold py-2 rounded">✨ Generar</button>
                <button id="batchBtn" class="bg-green-600 text-white font-bold py-2 rounded">🔄 Batch</button>
            </div>

            <div id="loading" class="mt-4 text-gray-400 text-sm hidden">⏳ Generando...</div>
        </div>

        <div class="lg:col-span-2">
            <div id="output" class="bg-gray-900 rounded-lg flex items-center justify-center overflow-hidden" style="min-height:400px;">
                <p id="outputText" class="text-gray-500">Tu imagen aparecerá aquí</p>
            </div>

            <div id="exportButtons" class="mt-4 hidden grid grid-cols-3 gap-2">
                <button id="exportInsta" class="bg-pink-600 text-white py-2 rounded text-xs font-bold">📸 Instagram</button>
                <button id="exportTikTok" class="bg-black border border-white text-white py-2 rounded text-xs font-bold">🎵 TikTok</button>
                <button id="exportLinkedIn" class="bg-blue-700 text-white py-2 rounded text-xs font-bold">💼 LinkedIn</button>
                <button id="exportTwitter" class="bg-blue-400 text-black py-2 rounded text-xs font-bold">𝕏 Twitter</button>
                <button id="stickerBtn" class="bg-green-500 text-black py-2 rounded text-xs font-bold">💬 Sticker</button>
                <button id="upscaleBtn" class="bg-yellow-500 text-black py-2 rounded text-xs font-bold">🔼 Upscayl</button>
                <button id="animationBtn" class="bg-indigo-600 text-white py-2 rounded text-xs font-bold col-span-3">🎬 Cine (5 frames)</button>
            </div>
        </div>
    </div>

    <div class="mt-12 bg-gray-900 p-6 rounded-lg">
        <h2 class="text-2xl font-bold mb-4">🖼️ Reference Board</h2>
        <input type="file" id="refImages" accept="image/*" multiple class="w-full bg-gray-800 p-2 rounded text-sm mb-3">
        <div id="refPreviews" class="grid grid-cols-5 gap-2 mb-3"></div>
        <button id="analyzeRefBtn" class="bg-violet-600 text-white py-2 px-6 rounded text-sm">🔮 Analizar</button>
        <div id="refResult" class="mt-4 hidden">
            <div id="refPromptText" class="bg-gray-800 p-3 rounded text-sm text-cyan-300 mb-2"></div>
            <button id="useRefPrompt" class="bg-cyan-500 text-black font-bold py-2 px-4 rounded text-sm">✨ Usar</button>
        </div>
    </div>

    <div class="mt-12 bg-gray-900 p-6 rounded-lg">
        <h2 class="text-2xl font-bold mb-4">🎨 Inpainting</h2>
        <canvas id="inpaintCanvas" class="w-full rounded border border-gray-700" style="display:none;max-width:512px;"></canvas>
        <p id="inpaintPlaceholder" class="text-gray-500 text-sm">Genera una imagen primero</p>
        <div id="inpaintControls" class="mt-4 hidden">
            <input type="range" id="brushSize" min="10" max="80" value="30" class="w-full mb-2">
            <textarea id="inpaintPrompt" class="w-full h-16 bg-gray-800 p-2 rounded text-sm mb-2" placeholder="¿Qué poner?"></textarea>
            <button id="inpaintBtn" class="bg-orange-500 text-white font-bold py-2 w-full rounded">🎨 Regenerar</button>
        </div>
    </div>

    <div class="mt-12">
        <h2 class="text-2xl font-bold mb-4">💾 Prompts Guardados</h2>
        <div id="savedPrompts" class="grid grid-cols-3 gap-2"></div>
    </div>

    <div class="mt-12">
        <h2 class="text-2xl font-bold mb-4">Galería</h2>
        <div id="gallery" class="grid grid-cols-4 gap-2"></div>
    </div>
</div>

<script src="main.js"></script>
</body>
</html>
